const SFX=(()=>{
  let ctx=null;
  function ac(){
    if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(ctx.state==='suspended')ctx.resume();
    return ctx;
  }
  function chip(freq=3500,vol=0.5,dur=0.06,delay=0){
    try{
      const c=ac(),t=c.currentTime+delay;
      const buf=c.createBuffer(1,Math.ceil(c.sampleRate*dur),c.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.25));
      const src=c.createBufferSource(),flt=c.createBiquadFilter(),g=c.createGain();
      flt.type='bandpass';flt.frequency.value=freq;flt.Q.value=8;
      src.buffer=buf;src.connect(flt);flt.connect(g);g.connect(c.destination);
      g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
      src.start(t);
    }catch(e){}
  }
  function tone(freq,dur,vol=0.2,delay=0,type='sine'){
    try{
      const c=ac(),t=c.currentTime+delay;
      const osc=c.createOscillator(),g=c.createGain();
      osc.type=type;osc.frequency.value=freq;
      osc.connect(g);g.connect(c.destination);
      g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
      osc.start(t);osc.stop(t+dur+0.05);
    }catch(e){}
  }
  let muted=localStorage.getItem('vpc_muted')==='1';
  return{
    get muted(){return muted;},
    toggle(){muted=!muted;localStorage.setItem('vpc_muted',muted?'1':'0');return muted;},
    fold(){   if(muted)return;tone(220,0.25,0.18);tone(180,0.2,0.12,0.08);},
    call(){   if(muted)return;chip(3200,0.45);},
    check(){  if(muted)return;chip(2800,0.3);},
    raise(){  if(muted)return;chip(3500,0.5);chip(3800,0.4,0.06,0.07);chip(4000,0.35,0.06,0.14);},
    allin(){  if(muted)return;for(let i=0;i<7;i++)chip(3200+i*150,0.6,0.07,i*0.04);tone(600,0.4,0.15,0.05,'triangle');},
    street(){ if(muted)return;tone(480,0.15,0.12);tone(600,0.12,0.1,0.12);tone(750,0.1,0.1,0.22);},
    win(){    if(muted)return;[0,.12,.24,.36].forEach((d,i)=>tone(400+i*120,0.4,0.2,d));},
  };
})();

// ── UTILS ─────────────────────────────────────────────────────────────────
function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e4)return Math.round(n/1e3)+'K';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return''+n;}
function fmtTime(s){return`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;}
function getBlind(b,l){return Math.round(b*BLIND_F[Math.min(l,BLIND_F.length-1)]);}
function seatPos(i,n){const t=Math.PI/2+(2*Math.PI*i/n);return{left:50+44*Math.cos(t),top:50+40*Math.sin(t)};}
function betPos(i,n){const t=Math.PI/2+(2*Math.PI*i/n);return{left:50+26*Math.cos(t),top:50+22*Math.sin(t)};}
function genCode(){return Array.from({length:4},()=>CODE_CHARS[Math.floor(Math.random()*CODE_CHARS.length)]).join('');}
function getMyId(){let id=localStorage.getItem('vpc_pid');if(!id){id=Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem('vpc_pid',id);}return id;}
function getDonIdx(pid){
  // pid: player id for online, 'local' for local device
  const key=pid?`vpc_wins_${pid}`:'vpc_games';
  const sinceKey=pid?`vpc_don_since_${pid}`:'vpc_don_since';
  const played=parseInt(localStorage.getItem(key)||'0');
  const since=parseInt(localStorage.getItem(sinceKey)||'0');
  const gap=played-since;
  if(gap<1)return -1;
  return Math.min(gap-1,19);
}
function getMilestone(pid){
  const key=pid?`vpc_wins_${pid}`:'vpc_games';
  const n=parseInt(localStorage.getItem(key)||'0');
  if(n===50)return 50;
  if(n===100)return 100;
  return 0;
}
function recordGame(pid){
  const key=pid?`vpc_wins_${pid}`:'vpc_games';
  const n=parseInt(localStorage.getItem(key)||'0')+1;
  localStorage.setItem(key,''+n);
  return n;
}
function recordDonation(pid){
  const key=pid?`vpc_wins_${pid}`:'vpc_games';
  const sinceKey=pid?`vpc_don_since_${pid}`:'vpc_don_since';
  const played=parseInt(localStorage.getItem(key)||'0');
  localStorage.setItem(sinceKey,''+(played+50));
}

// ── PURE GAME LOGIC  (blindLvl INSIDE gs) ─────────────────────────────────
function buildQueue(ps,bbI,n){
  const q=[];
  for(let i=1;i<=n;i++){const idx=(bbI+i)%n;if(!ps[idx].folded&&ps[idx].stack>0)q.push(ps[idx].id);}
  return q;
}
function computeSidePots(players, handBets){
  const active=players.filter(p=>!p.folded);
  if(active.length<=1)return null; // pas besoin
  const contribs=active.map(p=>({id:p.id,name:p.name,color:p.color,amount:handBets[p.id]||0}));
  const allSame=contribs.every(c=>c.amount===contribs[0].amount);
  if(allSame)return null; // pas de side pot
  const sorted=[...contribs].sort((a,b)=>a.amount-b.amount);
  const pots=[];
  let eligible=sorted.map(c=>c.id);
  let prev=0;
  for(let i=0;i<sorted.length;i++){
    const curr=sorted[i].amount;
    if(curr>prev&&eligible.length>0){
      pots.push({amount:(curr-prev)*eligible.length, eligible:[...eligible]});
      prev=curr;
    }
    eligible=eligible.filter(id=>id!==sorted[i].id);
  }
  return pots.length>0?pots:null;
}

function allBetsSettled(gs){
  // Ne pas terminer prématurément si curBet=0 (sinon le 1er check clôt la main)
  if(gs.curBet===0) return false;
  const active=gs.players.filter(p=>!p.folded);
  return active.every(p=>(gs.rBets[p.id]||0)>=gs.curBet||p.stack===0);
}
function collectBets(gs){
  const total=Object.values(gs.rBets).reduce((s,v)=>s+v,0);
  const newPot=gs.pot+total;
  // Accumuler les mises par joueur pour le calcul des side pots
  const newHandBets={...(gs.handBets||{})};
  Object.entries(gs.rBets).forEach(([id,amt])=>{newHandBets[id]=(newHandBets[id]||0)+amt;});
  const alive=gs.players.filter(p=>!p.folded);

  // Un seul joueur actif (tous les autres ont foldé)
  if(alive.length===1){
    const winner=alive[0];
    const newPs=gs.players.map(p=>p.id===winner.id?{...p,stack:p.stack+newPot}:p);
    // Vérifier si le tournoi est terminé (les autres sont-ils à 0 ?)
    const stillAlive=newPs.filter(p=>p.stack>0);
    if(stillAlive.length<=1){
      return{...gs,players:newPs,pot:0,rBets:{},bQueue:[],phase:'gameover',handBets:{}};
    }
    // Sinon : victoire de main, mais vérifier si tournoi terminé
    const stillHaveChips=newPs.filter(p=>p.stack>0);
    if(stillHaveChips.length<=1) return{...gs,players:newPs,pot:0,rBets:{},bQueue:[],phase:'gameover'};
    return{...gs,players:newPs,pot:0,rBets:{},bQueue:[],phase:'foldwin',handBets:{}};
  }

  // Plusieurs joueurs : avancer automatiquement aux rues suivantes
  const rn=gs.roundNum||0;

  // Si au plus 1 joueur a encore des jetons → showdown direct (all-in couvert)
  const canBet=alive.filter(p=>p.stack>0);
  if(canBet.length<=1){
    return{...gs,pot:newPot,rBets:{},bQueue:[],phase:'showdown',handBets:newHandBets,storedSidePots:computeSidePots(alive,newHandBets)};
  }

  if(rn<3){
    // Auto-advance : Preflop→Flop→Turn→River
    const newQ=[];
    for(let i=1;i<=gs.players.length;i++){
      const idx=(gs.dIdx+i)%gs.players.length;
      if(!gs.players[idx].folded&&gs.players[idx].stack>0)newQ.push(gs.players[idx].id);
    }
    const BB=getBlind(gs.startBlind,gs.blindLvl||0);
    const nextRn=rn+1;
    // Si la queue est vide (ex: tous all-in sauf 1) → showdown direct
    if(newQ.length===0) return{...gs,pot:newPot,rBets:{},bQueue:[],phase:'showdown',storedSidePots:computeSidePots(alive,newHandBets||{}),handBets:newHandBets||{}};
    return{...gs,pot:newPot,rBets:{},bQueue:newQ,curBet:0,lastRaise:BB,phase:'betting',roundNum:nextRn,newStreet:nextRn,handBets:newHandBets};
  }
  // Après la river (round 3) → showdown
  return{...gs,pot:newPot,rBets:{},bQueue:[],phase:'showdown',handBets:newHandBets,storedSidePots:computeSidePots(gs.players.filter(p=>!p.folded),newHandBets)};
}
function applyFold(gs,id){
  const newPs=gs.players.map(p=>p.id===id?{...p,folded:true}:p);
  const newQ=gs.bQueue.slice(1);
  const alive=newPs.filter(p=>!p.folded);
  if(alive.length<=1||newQ.length===0)return collectBets({...gs,players:newPs});
  return{...gs,players:newPs,bQueue:newQ};
}
function applyCall(gs,id){
  const p=gs.players.find(x=>x.id===id);
  const ab=gs.rBets[id]||0;
  const owed=Math.max(0,gs.curBet-ab);
  const put=Math.min(owed,p.stack);
  const newPs=gs.players.map(x=>x.id===id?{...x,stack:x.stack-put}:x);
  const newRB={...gs.rBets,[id]:ab+put};
  const newQ=gs.bQueue.slice(1);
  const newGs2={...gs,players:newPs,rBets:newRB,bQueue:newQ};
  if(newQ.length===0||allBetsSettled(newGs2))return collectBets(newGs2);
  return newGs2;
}
function applyRaise(gs,id,raiseAmt){
  const p=gs.players.find(x=>x.id===id);
  const ab=gs.rBets[id]||0;
  const put=Math.min(raiseAmt-ab,p.stack);
  const newTotal=ab+put;
  // All-in pour moins que le curBet = call (le curBet ne descend jamais)
  if(newTotal<=gs.curBet) return applyCall(gs,id);
  const BB=getBlind(gs.startBlind,gs.blindLvl);
  const rSize=newTotal-gs.curBet; // taille réelle de la relance
  const newPs=gs.players.map(x=>x.id===id?{...x,stack:x.stack-put}:x);
  const newRB={...gs.rBets,[id]:newTotal};
  const raiserI=gs.players.findIndex(x=>x.id===id);
  const newQ=[];
  for(let i=1;i<gs.players.length;i++){
    const idx=(raiserI+i)%gs.players.length;
    const x=newPs[idx];
    if(!x.folded&&x.id!==id&&x.stack>0)newQ.push(x.id);
  }
  const newGs3={...gs,players:newPs,rBets:newRB,curBet:newTotal,lastRaise:rSize,bQueue:newQ};
  if(newQ.length===0||allBetsSettled(newGs3))return collectBets(newGs3);
  return newGs3;
}
function applyWin(gs,wid){
  return{...gs,players:gs.players.map(p=>p.id===wid?{...p,stack:p.stack+gs.pot}:p),pot:0};
}
function applyNextStreet(gs){
  const active=gs.players.filter(p=>!p.folded);
  if(active.length<2)return gs;
  const newQ=[];
  for(let i=1;i<=gs.players.length;i++){
    const idx=(gs.dIdx+i)%gs.players.length;
    if(!gs.players[idx].folded&&gs.players[idx].stack>0)newQ.push(gs.players[idx].id);
  }
  const BB=getBlind(gs.startBlind,gs.blindLvl); // FIX: uses gs.blindLvl
  return{...gs,bQueue:newQ,curBet:0,rBets:{},lastRaise:BB,phase:'betting',roundNum:gs.roundNum+1};
}
function applyNextHand(gs){
  const alive=gs.players.filter(p=>p.stack>0);
  if(alive.length<2)return{...gs,phase:'gameover'};
  const n=alive.length;
  const cD=gs.players[gs.dIdx];
  const cDi=alive.findIndex(p=>p.id===cD.id);
  const nD=cDi>=0?(cDi+1)%n:0;
  const nSb=n<=2?nD:(nD+1)%n;
  const nBb=n<=2?(nD+1)%n:(nD+2)%n;
  const BB=getBlind(gs.startBlind,gs.blindLvl); // FIX: uses gs.blindLvl
  const SB=Math.max(1,Math.floor(BB/2));
  const sbP=Math.min(SB,alive[nSb].stack);
  const bbP=Math.min(BB,alive[nBb].stack);
  const newPs=alive.map((p,i)=>{
    if(i===nSb)return{...p,stack:p.stack-sbP,folded:false};
    if(i===nBb)return{...p,stack:p.stack-bbP,folded:false};
    return{...p,folded:false};
  });
  const initRB={[alive[nSb].id]:sbP,[alive[nBb].id]:bbP};
  return{...gs,players:newPs,dIdx:nD,bQueue:buildQueue(newPs,nBb,n),
    curBet:BB,rBets:initRB,lastRaise:BB,pot:0,phase:'betting',
    roundNum:0,handNum:gs.handNum+1,handBets:{},
    storedSidePots:null,sidePotIdx:0};
}

  const[donWinner,setDonWinner]=useState('');
  const[milestoneN,setMilestoneN]=useState(0);
  useEffect(()=>{
    try{
      const sc=localStorage.getItem('vpc_screen');
      const savedBm=localStorage.getItem('vpc_blindMins');
      if(sc==='local-game'&&localStorage.getItem('vpc_gs')){
        if(savedBm)setBlindMins(+savedBm);
        setScreen('local-game');
      }
    }catch{}
  },[]);

  // ── Undo stack ──
  const undoStack=useRef([]);
  const[hasUndo,setHasUndo]=useState(false);

  // ── Seat swap ──
  const[selSeat,setSelSeat]=useState(null);
  const[renameModal,setRenameModal]=useState(null); // {idx, name}
  const[paused,setPaused]=useState(false);
  const[showHands,setShowHands]=useState(false);
  const[streetBanner,setStreetBanner]=useState('');
  const[confirmQuit,setConfirmQuit]=useState(false);
  // ── TOURNAMENT STATE ────────────────────────────────────────────
  const[tCode,setTCode]=useState('');
  const[tName,setTName]=useState('Mon Tournoi');
  const[tSStack,setTSStack]=useState(1000);
  const[tBMins,setTBMins]=useState(15);
  const[tTables,setTTables]=useState([]); // [{id,name,subCode,players:[{id,name}]}]
  const[tWaiting,setTWaiting]=useState([]); // joueurs non encore assignés
  const[tSelPid,setTSelPid]=useState(null); // joueur sélectionné pour assignation
  const[isTD,setIsTD]=useState(false);
  const[tMyTable,setTMyTable]=useState(null); // {tableId,subCode,isHost}
  const[tPauseAll,setTPauseAll]=useState(false);
  const[tPendingXfer,setTPendingXfer]=useState(null); // {toSubCode,toName} à exécuter après la main
  const[tTableStatus,setTTableStatus]=useState({}); // {subCode:{players,handNum,done}}
  const[tNumTables,setTNumTables]=useState(2);
  const tChanRef2=useRef(null);
  const tAblyRef2=useRef(null);
  const tTablesRef=useRef([]); // ref miroir pour éviter les closures périmées
  const tWaitingRef=useRef([]);
  const[soundOn,setSoundOn]=useState(!SFX.muted); // ex: '🃏 FLOP'
  const[tableTheme,setTableTheme]=useState(()=>localStorage.getItem('vpc_theme')||'black');

  // ── Online ──
  const[isHost,setIsHost]=useState(false);
  const[roomCode,setRoomCode]=useState('');
  const[codeInput,setCodeInput]=useState('');
  const[nameInput,setNameInput]=useState('');
  const[lobbyPlayers,setLobbyPlayers]=useState([]);
  const[connMsg,setConnMsg]=useState('');
  const ablyRef=useRef(null);
  const chanRef=useRef(null);
  const myId=useRef(getMyId());
  const joinIntervalRef=useRef(null);

  // ── Timer ──
  useEffect(()=>{
    if(!gs||gs.phase==='waiting'||gs.phase==='gameover'||paused)return;
    const id=setInterval(()=>{
      setTimer(t=>{
        const nt=t<=1?blindMins*60:t-1;
        if(t<=1){
          setGs(prev=>{if(!prev)return prev;const nl=(prev.blindLvl||0)+1;const ng={...prev,blindLvl:nl};publishState(ng);saveLocal(ng,nt,null);return ng;});
          doNotif(L.nBlinds);
        } else if(nt%30===0){
          // Save every 30s
          setGs(prev=>{if(prev)saveLocal(prev,nt,null);return prev;});
        }
        return nt;
      });
    },1000);
    return()=>clearInterval(id);
  },[gs?.phase,blindMins,lang,paused]);

  // ── Reset raise slider ──
  // Synchroniser les refs du tournoi
  React.useEffect(()=>{tTablesRef.current=tTables;},[tTables]);
  React.useEffect(()=>{tWaitingRef.current=tWaiting;},[tWaiting]);

  // Stocker storedSidePots si calculé live (stabilisation entre renders)
  React.useEffect(()=>{
    if(gs?.phase==='showdown'&&(!gs.storedSidePots)&&gs.handBets&&Object.keys(gs.handBets).length>0){
      const sp=computeSidePots(gs.players.filter(p=>!p.folded),gs.handBets);
      if(sp){
        setGs(prev=>prev&&prev.phase==='showdown'&&!prev.storedSidePots?{...prev,storedSidePots:sp}:prev);
      }
    }
  },[gs?.phase,gs?.pot]);

  // Détecter changement de rue → afficher banner
  const STREET_LABELS=['','🃏 FLOP','↩ TURN','🌊 RIVER','Showdown'];
  useEffect(()=>{
    if(gs?.newStreet){
      const label=STREET_LABELS[gs.newStreet]||'';
      if(label){
        setStreetBanner(label);
        SFX.street();
        setTimeout(()=>setStreetBanner(''),1600);
      }
      // Nettoyer le flag pour éviter de re-déclencher
      setGs(prev=>prev?{...prev,newStreet:undefined}:prev);
    }
  },[gs?.newStreet]);

  useEffect(()=>{
    if(!gs||!gs.bQueue.length)return;
    const id=gs.bQueue[0];
    const p=gs.players.find(x=>x.id===id);
    if(!p)return;
    const ab=gs.rBets[id]||0;
    const BB=getBlind(gs.startBlind,gs.blindLvl||0);
    const minRaise=Math.min(gs.curBet+Math.max(gs.lastRaise,BB), p.stack+ab);
    setRaiseAmt(minRaise);
  },[gs?.bQueue?.[0],gs?.curBet,gs?.phase]);

  function saveLocal(newGs,newTimer,sc){
    try{
      localStorage.setItem('vpc_gs',JSON.stringify(newGs));
      localStorage.setItem('vpc_timer',''+newTimer);
      localStorage.setItem('vpc_screen',sc||screen);
      localStorage.setItem('vpc_blindMins',''+blindMins);
    }catch{}
  }
  function publishState(newGs){
    if(chanRef.current&&isHost){
      chanRef.current.publish('state',{gs:newGs,timer});
    }
  }
  function quitGame(){
    if(joinIntervalRef.current){clearInterval(joinIntervalRef.current);joinIntervalRef.current=null;}
    if(ablyRef.current){try{ablyRef.current.close();}catch(e){}}
    ablyRef.current=null; chanRef.current=null;
    localStorage.removeItem('vpc_screen');
    setGs(null); setScreen('landing'); setIsHost(false);
    setRoomCode(''); setLobbyPlayers([]); setConnMsg('');
  }

  // ── TOURNAMENT FUNCTIONS ──────────────────────────────────────
  function genTCode(){return Array.from({length:4},()=>'ABCDEFGHJKLMNPQRSTUVWXYZ'[Math.floor(Math.random()*23)]).join('');}

  function initTournamentAsTD(){
    const code=genTCode();
    // Naviguer d'abord pour éviter blocage si Ably échoue
    setTCode(code);
    setIsTD(true);
    setTTables([
      {id:'T1',name:'Table 1',subCode:code+'1',players:[]},
      {id:'T2',name:'Table 2',subCode:code+'2',players:[]},
    ]);
    setScreen('t-host-lobby');

    if(ABLY_KEY==='YOUR_ABLY_API_KEY'){
      setConnMsg('⚠ Configurez votre clé Ably pour activer le multijoueur');
      return;
    }
    try{
      const ab=new Ably.Realtime({key:ABLY_KEY,clientId:myId.current});
      tAblyRef2.current=ab;
      const ch=ab.channels.get(`vpct-${code}`);
      tChanRef2.current=ch;
      ch.subscribe('t-join',(msg)=>{
        setTWaiting(prev=>[...prev.filter(p=>p.id!==msg.data.id),{id:msg.data.id,name:msg.data.name}]);
        // Confirmer au joueur (stop retry)
        ch.publish('t-lobby',{received:msg.data.id});
      });
      ch.subscribe('t-stack-report',(msg)=>{
        setTTableStatus(prev=>({...prev,[msg.data.subCode]:{players:msg.data.players,handNum:msg.data.handNum,done:false}}));
      });
      ch.subscribe('t-table-done',(msg)=>{
        setTTableStatus(prev=>({...prev,[msg.data.subCode]:{...prev[msg.data.subCode],done:true,winner:msg.data.winner}}));
      });
    }catch(e){
      console.error('Ably tournament error:',e);
      setConnMsg('⚠ Erreur Ably: '+e.message);
    }
  }

  function joinTournamentChannel(code){
    if(!code||code.length!==4)return;
    setTCode(code); setIsTD(false);
    setScreen('t-player-wait'); // Naviguer d'abord
    if(ABLY_KEY==='YOUR_ABLY_API_KEY'){setConnMsg('Clé Ably manquante');return;}
    try{
    const ab=new Ably.Realtime({key:ABLY_KEY,clientId:myId.current});
    tAblyRef2.current=ab;
    const ch=ab.channels.get(`vpct-${code}`);
    tChanRef2.current=ch;
    // S'abonner D'ABORD, publier ensuite (évite les messages perdus)
    ch.subscribe('t-assign',(msg)=>{
      if(msg.data.pid!==myId.current)return;
      setTMyTable({tableId:msg.data.tableId,subCode:msg.data.subCode,isHost:msg.data.isHost,tableName:msg.data.tableName});
    });
    // Écouter le lancement
    ch.subscribe('t-start-all',(msg)=>{
      const assign=msg.data.assigns.find(a=>a.pid===myId.current);
      if(!assign)return;
      setTMyTable(prev=>({...prev,isHost:assign.isHost}));
      setStartChips(msg.data.startStack);
      setBlindMins(msg.data.blindMins);
      setRoomCode(assign.subCode);
      if(assign.isHost){
        const lp=[...msg.data.assigns.filter(a=>a.subCode===assign.subCode).map(a=>({id:a.pid,name:a.name}))];
        setLobbyPlayers(lp);
        setIsHost(true);
        setScreen('online-game');
        setNumP(lp.length);
        // CRITIQUE: initAbly d'abord (crée chanRef), puis lancer la partie
        initAbly(assign.subCode, true);
        setTimeout(()=>doLaunchOnline(msg.data.startStack,msg.data.blindMins,lp), 800);
      } else {
        setScreen('online-game');
        setConnMsg('Connexion à la table...');
        // Guest attend que le host publie 'start' ou 'state'
        setTimeout(()=>initAblyAsGuest(assign.subCode), 600);
      }
    });
    // Annoncer sa présence APRÈS les subscriptions
    ch.publish('t-join',{id:myId.current,name:nameInput||'Joueur'});
    // Republier régulièrement jusqu'à confirmation
    const retryJoin=setInterval(()=>ch.publish('t-join',{id:myId.current,name:nameInput||'Joueur'}),2000);
    ch.subscribe('t-lobby',()=>clearInterval(retryJoin)); // stop quand DT confirme
    // Pause globale
    ch.subscribe('t-pause',()=>{setPaused(true);setTPauseAll(true);});
    ch.subscribe('t-resume',()=>{setPaused(false);setTPauseAll(false);});
    // Transfert — notification
    ch.subscribe('t-xfer-notify',(msg)=>{
      if(msg.data.pid!==myId.current)return;
      setTPendingXfer({toSubCode:msg.data.toSubCode,toName:msg.data.toName});
    });
    // Ajout d'un joueur retardataire à la table
    ch.subscribe('t-add-player',(msg)=>{
      if(msg.data.subCode!==assign?.subCode)return;
      // Ajouter aux pendingAdditions pour inclusion à la prochaine main
      setGs(prev=>{
        if(!prev)return prev;
        const already=prev.players.some(p=>p.id===msg.data.player.id);
        if(already)return prev;
        const color=SEAT_COLORS[prev.players.length%SEAT_COLORS.length];
        const newP={id:msg.data.player.id,name:msg.data.player.name,stack:tSStack,color,folded:false};
        return{...prev,players:[...prev.players,newP]};
      });
    });
    // Recave — ajouter des jetons à un joueur
    ch.subscribe('t-recave',(msg)=>{
      if(!isHost)return; // seul le host de table traite
      setGs(prev=>{
        if(!prev)return prev;
        const newPs=prev.players.map(p=>p.id===msg.data.pid?{...p,stack:p.stack+msg.data.amount}:p);
        const next={...prev,players:newPs};
        if(chanRef.current) chanRef.current.publish('state',{gs:next,timer:0});
        return next;
      });
    });
    // Transfert — exécution (après la main)
    ch.subscribe('t-xfer-go',(msg)=>{
      if(msg.data.pid!==myId.current)return;
      // Quitter table actuelle et rejoindre nouvelle
      if(ablyRef.current){try{ablyRef.current.close();}catch(e){}}
      ablyRef.current=null; chanRef.current=null;
      setGs(null); setScreen('t-player-wait');
      setTMyTable(prev=>({...prev,subCode:msg.data.toSubCode,tableName:msg.data.toName,isHost:false}));
      setTPendingXfer(null);
      setTimeout(()=>initAblyAsGuest(msg.data.toSubCode),400);
    });
    }catch(e){console.error('Ably join error:',e);setConnMsg('Erreur: '+e.message);}
  }

  function doLaunchOnline(stack,bmins,players){
    const ps=players.map((lp,i)=>({id:lp.id,name:lp.name,stack,color:SEAT_COLORS[i%SEAT_COLORS.length],folded:false}));

        chanRef.current.subscribe('join',()=>{
          setGs(cur=>{if(cur&&chanRef.current)chanRef.current.publish('state',{gs:cur,timer:0});return cur;});
        });
      } else if(n>0) setTimeout(()=>tryPublish(n-1),400);
    };
    setTimeout(()=>tryPublish(6),300);
  }

  function doNotif(msg){setNotif(msg);setTimeout(()=>setNotif(''),2400);}

  // ── Undo ──
  function pushUndo(currentGs){
    undoStack.current=[...undoStack.current.slice(-9),currentGs];
    setHasUndo(true);
  }
  function doUndo(){
    if(!undoStack.current.length)return;
    const prev=undoStack.current[undoStack.current.length-1];
    undoStack.current=undoStack.current.slice(0,-1);
    setGs(prev);
    publishState(prev);
    if(undoStack.current.length===0)setHasUndo(false);
  }

  // ── Seat swap ──
  function handleSeatTap(i){
    if(gs?.phase==='betting')return; // no reordering mid-hand
    if(selSeat===null){setSelSeat(i);return;}
    if(selSeat===i){setSelSeat(null);return;}
    // Swap
    const newPs=[...gs.players];
    [newPs[selSeat],newPs[i]]=[newPs[i],newPs[selSeat]];
    const dealerId=gs.players[gs.dIdx].id;
    const newDIdx=newPs.findIndex(p=>p.id===dealerId);
    const next={...gs,players:newPs,dIdx:newDIdx};
    setGs(next);
    publishState(next);
    setSelSeat(null);
  }

  // ── Ably ──
  function initAbly(code,host){
    if(ABLY_KEY==='YOUR_ABLY_API_KEY')return;
    try{
      const client=new Ably.Realtime({key:ABLY_KEY,clientId:myId.current});
      ablyRef.current=client;
      const ch=client.channels.get(`vpc-${code}`);
      chanRef.current=ch;
      client.connection.on('connected',()=>setConnMsg(''));
      client.connection.on('disconnected',()=>setConnMsg(L.reconnecting));
      client.connection.on('suspended',()=>setConnMsg(L.reconnecting));
      client.connection.on('failed',(e)=>{setConnMsg(L.reconnecting);captureErr(e);});
      if(host){
        ch.subscribe('action',(msg)=>{
          const{pid,type,amount}=msg.data;
          setGs(prev=>{
            if(!prev||prev.bQueue[0]!==pid)return prev; // sécurité : vérif que c'est bien son tour
            let next;
            if(type==='fold')next=applyFold(prev,pid);
            else if(type==='call')next=applyCall(prev,pid);
            else if(type==='raise')next=applyRaise(prev,pid,amount);
            else return prev;
            // Broadcaster le nouvel état à tous les joueurs
            ch.publish('state',{gs:next,timer:0});
            return next;
          });
        });
        const seenJoins=new Set();
        ch.subscribe('join',(msg)=>{
          setLobbyPlayers(prev=>{
            const updated=[...prev.filter(p=>p.id!==msg.data.id),msg.data];
            return updated;
          });
          // Confirmer au guest qu'on l'a reçu (stop retry)
          if(!seenJoins.has(msg.data.id)){
            seenJoins.add(msg.data.id);
            ch.publish('lobby',{received:msg.data.id});
          }
        });
      }else{
        ch.subscribe('state',(msg)=>{
          if(msg.data.gs){
            setGs(msg.data.gs);
            if(msg.data.timer)setTimer(msg.data.timer);
          }
        });
        ch.subscribe('lobby',(msg)=>{
          // Host confirms receipt of join — stop retrying
          if(joinIntervalRef.current){clearInterval(joinIntervalRef.current);joinIntervalRef.current=null;}
        });
        ch.subscribe('start',(msg)=>{
          if(joinIntervalRef.current){clearInterval(joinIntervalRef.current);joinIntervalRef.current=null;}
          setGs(msg.data.gs);setTimer(msg.data.blindMins*60);setScreen('online-game');
        });
        // Publier join toutes les 1.5s jusqu'à confirmation (fix race condition)
        const joinPayload={id:myId.current,name:nameInput||'Player'};
        ch.publish('join',joinPayload);
        joinIntervalRef.current=setInterval(()=>ch.publish('join',joinPayload),1500);
      }
    }catch(e){captureErr(e);}
  }

  // ── Game action handlers ──
  function act(fn,...args){
    pushUndo(gs);
    const next=fn(gs,...args);
    setGs(next);
    publishState(next);
    saveLocal(next,timer,screen);
    return next;
  }
  // En mode online, les guests envoient une action au host via Ably
  // Le host traite et broadcast le nouvel état à tous
  function sendAction(type, amount){
    if(screen==='online-game' && !isHost && chanRef.current){
      chanRef.current.publish('action',{pid:myId.current, type, amount});
    }
  }
  function isGuest(){ return screen==='online-game' && !isHost; }

  // Appelé après chaque fin de main (foldwin, showdown win, gameover)
  function triggerDonation(winnerPlayer){
    const pid=screen==='online-game'?winnerPlayer?.id:null;
    recordGame(pid);
    const ms=getMilestone(pid);
    const didx=getDonIdx(pid);
    const isWinner=screen==='local-game'||(winnerPlayer?.id===myId.current);
    if(isWinner){
      setDonWinner(winnerPlayer?.name||'');
      if(ms>0)setMilestoneN(ms);
      else if(didx>=0)setDonIdx(didx);
    }
  }
  function checkHandEnd(next){
    if(next.phase==='foldwin'){
      const fw=next.players.filter(p=>!p.folded&&p.stack>0);
      const winner=fw[0];
      if(winner) doNotif(L.nWinsH(winner.name));
    } else if(next.phase==='gameover'){
      const w=next.players.reduce((best,p)=>p.stack>=(best?.stack||0)?p:best, null);
      triggerDonation(w);
      doNotif(L.nWinsG(w?.name||'?'));
    }
  }
  function handleFold(){
    SFX.fold();
    if(isGuest()){ sendAction('fold'); return; }
    const next=act(applyFold,gs.bQueue[0]);
    checkHandEnd(next);
  }
  function handleCall(){
    isCheck?SFX.check():SFX.call();
    if(isGuest()){ sendAction('call'); return; }
    act(applyCall,gs.bQueue[0]);
  }
  function handleRaise(amt){
    isAllIn?SFX.allin():SFX.raise();
    if(isGuest()){ sendAction('raise', amt); return; }
    act(applyRaise,gs.bQueue[0],amt);
  }
  // Distribue tous les pots où le joueur est éligible (shortcut "gagne la main")
  function handleWinAll(pid){
    const winner=gs.players.find(p=>p.id===pid);
    if(!winner)return;
    SFX.win();
    const allPots=gs.storedSidePots||[];
    const startIdx=gs.sidePotIdx||0;
    let curPs=[...gs.players];
    let curPot=gs.pot;
    let curIdx=startIdx;
    let wonByWinner=0; // ce que gagne spécifiquement ce joueur
    // Distribuer tous les pots où pid est éligible
    while(curIdx<allPots.length){
      const sp=allPots[curIdx];
      if(!sp)break;
      const eligible=curPs.filter(p=>!p.folded&&sp.eligible.includes(p.id));
      if(eligible.some(p=>p.id===pid)){
        // Ce joueur est éligible → lui donner
        curPs=curPs.map(p=>p.id===pid?{...p,stack:p.stack+sp.amount}:p);
        curPot=Math.max(0,curPot-sp.amount);
        wonByWinner+=sp.amount; // compter seulement ce qu'il gagne
        curIdx++;
      } else if(eligible.length===1){
        // Un seul autre éligible → auto-retourner (ne compte pas dans les gains du vainqueur)
        const autoId=eligible[0].id;
        curPs=curPs.map(p=>p.id===autoId?{...p,stack:p.stack+sp.amount}:p);
        curPot=Math.max(0,curPot-sp.amount);
        curIdx++;
      } else {
        break; // Plusieurs éligibles sans notre joueur → arrêter
      }
    }
    const next={...gs,players:curPs,pot:curPot,sidePotIdx:curIdx};
    setGs(next);publishState(next);
    doNotif(L.nWinsP(winner.name,fmt(wonByWinner)));
    if(curPot<=0){
      const stillAlive=curPs.filter(p=>p.stack>0);
      if(stillAlive.length<=1){
        const go={...next,phase:'gameover'};
        setGs(go);checkHandEnd(go);
      }
    }
  }

  function handleWinPot(pid, amount, nextPotIdx){
    const winner=gs.players.find(p=>p.id===pid);
    if(!winner)return;
    SFX.win();
    let curPs=gs.players.map(p=>p.id===pid?{...p,stack:p.stack+amount}:p);
    let curPot=Math.max(0,gs.pot-amount);
    let curIdx=nextPotIdx||0;
    const allPots=gs.storedSidePots||[];
    // Auto-cascade les pots non couverts (1 seul éligible)
    while(curIdx<allPots.length){
      const sp=allPots[curIdx];
      if(!sp)break;
      const eligible=curPs.filter(p=>!p.folded&&sp.eligible.includes(p.id));
      if(eligible.length===1){
        // Auto-distribuer sans clic
        const autoId=eligible[0].id;
        curPs=curPs.map(p=>p.id===autoId?{...p,stack:p.stack+sp.amount}:p);
        curPot=Math.max(0,curPot-sp.amount);
        curIdx++;
      } else break;
    }
    const next={...gs,players:curPs,pot:curPot,sidePotIdx:curIdx};
    setGs(next);
    publishState(next);
    doNotif(L.nWinsP(winner.name,fmt(amount)));
    if(curPot<=0){
      const stillAlive=curPs.filter(p=>p.stack>0);
      if(stillAlive.length<=1){
        const go={...next,phase:'gameover'};
        setGs(go);checkHandEnd(go);
      }
    }
  }
  function handleWin(pid){
    const winner=gs.players.find(p=>p.id===pid);
    if(!winner)return;
    SFX.win();
    const potAmt=gs.pot;
    const newPs=gs.players.map(p=>p.id===pid?{...p,stack:p.stack+potAmt}:p);
    const next={...gs,players:newPs,pot:0};
    doNotif(L.nWinsP(winner.name,fmt(potAmt)));
    const stillAlive=newPs.filter(p=>p.stack>0);
    // setGs ONCE avec l'état final correct
    const finalGs=stillAlive.length<=1?{...next,phase:'gameover'}:next;
    setGs(finalGs);
    publishState(finalGs);
    if(stillAlive.length<=1)checkHandEnd(finalGs);
  }
  function handleNextStreet(){act(applyNextStreet);}
  function handleNextHand(){
    const alive=gs.players.filter(p=>p.stack>0);
    const eliminated=gs.players.filter(p=>p.stack===0).map(p=>p.name);
    const next=act(applyNextHand);
    if(next.phase==='gameover'){
      checkHandEnd(next);
      return;
    }
    // Aussi vérifier si après la main, il ne reste qu'1 joueur avec chips
    const aliveAfter=next.players.filter(p=>p.stack>0);
    if(aliveAfter.length<=1){
      const goNext={...next,phase:'gameover'};
      setGs(goNext);
      checkHandEnd(goNext);
      if(tMyTable&&isHost) reportTournamentStacks(goNext);
      return;
    }
    // Reporter les stacks au DT si mode tournoi
    if(tMyTable&&isHost) reportTournamentStacks(next);
    if(eliminated.length)setTimeout(()=>doNotif(L.nElim(eliminated.join(', '))),80);
  }

  // ── Start local game ──
  function makeInitGs(players,startBlind,startChips,blindLvl=0){
    const ps=players;
    const n=ps.length;
    const d=Math.floor(Math.random()*n);
    const sb=n<=2?d:(d+1)%n;
    const bb=n<=2?(d+1)%n:(d+2)%n;
    const BB=getBlind(startBlind,blindLvl);
    const SB=Math.max(1,Math.floor(BB/2));
    const sbP=Math.min(SB,ps[sb].stack);
    const bbP=Math.min(BB,ps[bb].stack);
    const newPs=ps.map((p,i)=>{
      if(i===sb)return{...p,stack:p.stack-sbP};
      if(i===bb)return{...p,stack:p.stack-bbP};
      return p;
    });
    return{players:newPs,pot:0,dIdx:d,handNum:1,
      bQueue:buildQueue(newPs,bb,n),curBet:BB,
      rBets:{[ps[sb].id]:sbP,[ps[bb].id]:bbP},
      lastRaise:BB,phase:'betting',roundNum:0,
      startBlind,startChips,blindLvl:0};
  }
  function startLocal(){
    const ps=pNames.slice(0,numP).map((nm,i)=>({id:i,name:nm.trim()||DEF_NAMES[i],stack:startChips,color:SEAT_COLORS[i%SEAT_COLORS.length],folded:false}));
    const initGs=makeInitGs(ps,startBlind,startChips);
    setGs(initGs);setTimer(blindMins*60);setTab('game');
    undoStack.current=[];setHasUndo(false);setSelSeat(null);
    saveLocal(initGs,blindMins*60,'local-game');
    localStorage.setItem('vpc_last_screen','local-game');
    setScreen('local-game');
  }
  function applyRename(idx,name){
    const newPs=gs.players.map((p,i)=>i===idx?{...p,name:name.trim()||p.name}:p);
    const next={...gs,players:newPs};
    setGs(next);saveLocal(next,timer,screen);
    // Also update pNames for future rematch
    const newNames=[...pNames];newNames[idx]=name.trim()||pNames[idx];
    setPNames(newNames);
    setRenameModal(null);
  }
  function startRematch(){
    // Same players, same settings, new game
    const ps=gs.players.map((p,i)=>({...p,stack:gs.startChips||startChips,folded:false}));
    const initGs=makeInitGs(ps,gs.startBlind||startBlind,gs.startChips||startChips);
    setGs(initGs);setTimer(blindMins*60);setTab('game');
    undoStack.current=[];setHasUndo(false);setSelSeat(null);
    saveLocal(initGs,blindMins*60,'local-game');
    setDonIdx(-1);
  }
  function startHostLobby(){
    const code=genCode();
    setRoomCode(code);setIsHost(true);
    setLobbyPlayers([{id:myId.current,name:pNames[0]||'Host',isHost:true}]);
    initAbly(code,true);
    setScreen('host-lobby');
  }
  function launchOnlineGame(){
    const allP=lobbyPlayers.slice(0,numP);
    if(allP.length<2)return;
    // S'assurer que chaque joueur a son UUID comme id (important pour isMyTurn)
    const ps=allP.map((lp,i)=>({id:lp.id,name:lp.name,stack:startChips,color:SEAT_COLORS[i%SEAT_COLORS.length],folded:false}));
    const initGs=makeInitGs(ps,startBlind,startChips);
    setGs(initGs);setTimer(blindMins*60);
    if(chanRef.current)chanRef.current.publish('start',{gs:initGs,blindMins});
    setTab('game');
    localStorage.setItem('vpc_last_screen','online-game');
    setScreen('online-game');
  }
  function joinGame(){
    const code=codeInput.trim().toUpperCase();
    if(code.length!==4)return;
    setRoomCode(code);setIsHost(false);
    initAbly(code,false);setScreen('join-wait');
  }

  // ── Derived game state ──
  const np=gs?.players.length||0;
  const sbIdx=np<=2?gs?.dIdx:(gs?.dIdx+1)%np;
  const bbIdx=np<=2?(gs?.dIdx+1)%np:(gs?.dIdx+2)%np;
  const curId=gs?.bQueue?.[0];
  const curActor=gs?.players.find(p=>p.id===curId);
  const active=gs?.players.filter(p=>!p.folded)||[];
  const alreadyBet=(curId!==undefined&&gs?.rBets?.[curId])||0;
  const BB_now=gs?getBlind(gs.startBlind,gs.blindLvl||0):0;
  const SB_now=Math.max(1,Math.floor(BB_now/2));
  const owed=Math.max(0,(gs?.curBet||0)-alreadyBet);
  const isCheck=owed===0&&gs?.phase==='betting';
  const actorAllIn=curActor?curActor.stack+alreadyBet:0;
  const minRaiseAmt=curActor?Math.min(Math.max((gs?.curBet||0)+Math.max(gs?.lastRaise||0,BB_now), BB_now*2), actorAllIn):0;
  const raiseAmtIsAllIn=raiseAmt>=actorAllIn&&actorAllIn>0;
  const isAllIn=raiseAmtIsAllIn;
  const othersAllIn=gs&&curActor?gs.players.filter(p=>!p.folded&&p.id!==curActor.id).every(p=>p.stack===0):false;
  const canShowRaise=!othersAllIn;
  // Preset buttons
  const halfPot=Math.min(Math.max(Math.round((gs?.pot||0)/2), minRaiseAmt), actorAllIn);
  const fullPot=Math.min(Math.max(gs?.pot||0, minRaiseAmt), actorAllIn);
  const raisePresets=curActor?[
    {label:'½ Pot', val:halfPot},
    {label:'Pot',   val:fullPot},
  ].filter((p,i,arr)=>i===0||p.val!==arr[i-1].val):[];
  const roundBets=gs?Object.values(gs.rBets||{}).reduce((s,v)=>s+v,0):0;
  // Side pots
  // Toujours recalculer les side pots en live depuis handBets pour garantir la fraîcheur
  const sidePots=(()=>{
    if(!gs||gs.phase!=='showdown')return null;
    const stored=gs.storedSidePots;
    if(stored&&stored.length>0)return stored;
    // Recalcul live depuis handBets actuel
    const liveSP=computeSidePots(gs.players.filter(p=>!p.folded),gs.handBets||{});
    return liveSP;
  })();
  const timerCrit=timer<60;
  const roundLabel=gs?L.rounds[Math.min(gs.roundNum,L.rounds.length-1)]:'';
  // Local: tout le monde voit (1 téléphone)
  // Online: chacun joue quand c'est son UUID — symétrique host/guest
  const isMyTurn=gs&&curActor&&(
    screen==='local-game' ||
    (screen==='online-game' && curActor.id===myId.current)

  // ── Shared styles ──
  const card={background:T.panel,border:'1px solid rgba(255,255,255,.07)',borderRadius:'14px',padding:'18px 16px',marginBottom:'10px'};
  const lbl={fontSize:'13px',letterSpacing:'3px',color:T.gold,display:'block',marginBottom:'12px'};
  const spinBtn={background:'transparent',border:'1px solid rgba(255,255,255,.18)',color:T.gold,width:'40px',height:'40px',borderRadius:'8px',cursor:'pointer',fontSize:'22px',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center'};
  const inp={background:'transparent',border:'1px solid rgba(255,255,255,.12)',borderRadius:'10px',padding:'12px 14px',color:T.text,fontFamily:"'Barlow Condensed',sans-serif",fontSize:'18px',width:'100%',outline:'none'};

  // ════════════════════════════════════════════════════════════════════
  if(screen==='landing')return(
    <div style={{minHeight:'100%',height:'100dvh',background:T.bg,fontFamily:"'Barlow Condensed',sans-serif",color:T.text,display:'flex',flexDirection:'column',alignItems:'center',padding:'0 14px 60px',overflowY:'auto',WebkitOverflowScrolling:'touch',position:'relative',zIndex:0}}>
      <style>{CSS}</style>
      <div style={{textAlign:'center',padding:'32px 0 44px'}}>
        <div style={{fontSize:'60px',marginBottom:'10px'}}>♠</div>
        <div style={{fontSize:'30px',fontWeight:800,letterSpacing:'3px',color:T.gold}}>VIRTUAL POKER CHIPS</div>
        <div style={{fontSize:'13px',letterSpacing:'4px',color:T.dim,marginTop:'6px'}}>{L.subtitle}</div>
      </div>
      <div style={{width:'100%',maxWidth:'360px',display:'flex',flexDirection:'column',gap:'14px'}}>
        {/* Resume button if game in progress */}
        {gs&&gs.phase!=='gameover'&&(
          <button onClick={()=>setScreen(localStorage.getItem('vpc_last_screen')||'local-game')} style={{padding:'20px 22px',background:`rgba(212,175,55,.12)`,border:`2px solid ${T.gold}55`,borderRadius:'16px',color:T.text,fontFamily:'inherit',cursor:'pointer',display:'flex',alignItems:'center',gap:'16px',textAlign:'left'}}>
            <span style={{fontSize:'32px'}}>▶</span>
            <div>
              <div style={{fontSize:'22px',fontWeight:700,letterSpacing:'2px',color:T.gold}}>REPRENDRE</div>
              <div style={{fontSize:'14px',color:T.dim,marginTop:'3px'}}>{L.hand} #{gs.handNum} · {gs.players.filter(p=>!p.folded).length} joueurs actifs</div>
            </div>
          </button>
        )}
        {/* Table theme selector */}
        <div style={{background:T.panel,border:'1px solid rgba(255,255,255,.08)',borderRadius:'16px',padding:'18px 16px'}}>
          <div style={{fontSize:'11px',letterSpacing:'3px',color:T.gold,marginBottom:'12px'}}>{L.tableTheme||'TABLE STYLE'}</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'7px'}}>
            {Object.entries(TABLE_THEMES).map(([key,th])=>(
              <button key={key} onClick={()=>{setTableTheme(key);localStorage.setItem('vpc_theme',key);}} style={{padding:'0',borderRadius:'10px',border:`2px solid ${tableTheme===key?T.gold:'rgba(255,255,255,.1)'}`,background:'transparent',cursor:'pointer',overflow:'hidden',position:'relative',aspectRatio:'1',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end'}}>

                  : <div style={{position:'absolute',inset:0,background:`radial-gradient(ellipse,${T.felt},${T.felt2})`,borderRadius:'8px'}}/>
                }
                <div style={{position:'relative',zIndex:1,width:'100%',background:'rgba(0,0,0,.55)',padding:'4px 2px',textAlign:'center'}}>
                  <div style={{fontSize:'11px',fontWeight:700,color:tableTheme===key?T.gold:'#fff',letterSpacing:'.5px',lineHeight:1.2,fontFamily:"'Barlow Condensed',sans-serif"}}>{th.label.split(' ').slice(1).join(' ')}</div>
                </div>
              </button>
            ))}
          </div>
        </div>
        {/* Lang selector on landing */}
        <div style={{background:T.panel,border:'1px solid rgba(255,255,255,.08)',borderRadius:'16px',padding:'14px 16px'}}>
          <div style={{fontSize:'11px',letterSpacing:'3px',color:T.gold,marginBottom:'10px'}}>LANGUE</div>
          <div style={{display:'flex',gap:'7px',flexWrap:'wrap'}}>
            {LANGS.map(l=><button key={l} className={`lb${lang===l?' on':''}`} onClick={()=>setLang(l)} style={{fontSize:'14px',padding:'7px 12px'}}>{l}</button>)}

        </div>
        {/* ♥ Permanent heart donate button */}
        <div style={{textAlign:'center',padding:'4px 0'}}>
          <HeartDonateBtn L={L} onClick={()=>DONATE_URL!=='YOUR_DONATION_URL'?window.open(DONATE_URL,'_blank'):null}/>

          </div>
        </div>
        {/* ── BOUTON TOURNOI ── */}
        <div style={{borderRadius:'14px',border:'1px solid rgba(212,175,55,.3)',background:'rgba(212,175,55,.06)',padding:'16px 18px',cursor:'pointer',display:'flex',alignItems:'center',gap:'14px'}}

          <span style={{fontSize:'28px'}}>🏆</span>
          <div>
            <div style={{fontSize:'18px',fontWeight:800,color:T.gold,letterSpacing:'2px'}}>TOURNOI</div>
            <div style={{fontSize:'13px',color:T.dim,marginTop:'2px'}}>Créer ou rejoindre un tournoi</div>
          </div>
        </div>

        {[{label:L.local,icon:'📱',desc:'1 téléphone · tour par tour',onClick:()=>setScreen('local-setup')},
          {label:L.host,icon:'🌐',desc:'Créer une partie en ligne',onClick:()=>setScreen('host-setup')},
          {label:L.join,icon:'🎯',desc:'Rejoindre avec un code',onClick:()=>setScreen('join')},
        ].map(({label,icon,desc,onClick})=>(
          <button key={label} onClick={onClick} style={{padding:'20px 22px',background:T.panel,border:'1px solid rgba(255,255,255,.1)',borderRadius:'16px',color:T.text,fontFamily:'inherit',cursor:'pointer',display:'flex',alignItems:'center',gap:'16px',textAlign:'left'}}>
            <span style={{fontSize:'32px'}}>{icon}</span>
            <div>
              <div style={{fontSize:'22px',fontWeight:700,letterSpacing:'2px',color:T.gold}}>{label}</div>
              <div style={{fontSize:'14px',color:T.dim,marginTop:'3px'}}>{desc}</div>
            </div>
          </button>
        ))}
      </div>
    </div>
  );

  if(screen==='local-setup'||screen==='host-setup'){
    const isOnline=screen==='host-setup';
    return(
      <div style={{height:'100dvh',background:T.bg,fontFamily:"'Barlow Condensed',sans-serif",color:T.text,display:'flex',flexDirection:'column',alignItems:'center',overflowY:'auto',WebkitOverflowScrolling:'touch'}}>

        <div style={{width:'100%',maxWidth:'420px',padding:'16px 14px 0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>

        <div style={{textAlign:'center',padding:'22px 0 18px'}}>

        </div>
        <div style={{width:'100%',maxWidth:'420px',padding:'0 14px',animation:'fadeIn .3s ease'}}>
          <div style={card}>

                  <div style={{width:'12px',height:'12px',borderRadius:'50%',background:SEAT_COLORS[i],flexShrink:0}}/>
                  <input value={pNames[i]} placeholder={DEF_NAMES[i]} onChange={e=>{const a=[...pNames];a[i]=e.target.value;setPNames(a);}} style={inp}/>

            </div>
          </div>
          <div style={card}>

                <div key={label}>
                  <label style={{...lbl,marginBottom:'10px'}}>{label}</label>

                    <button style={spinBtn} onClick={()=>set(v=>Math.max(min,v-step))}>−</button>
                    <div style={{flex:1,textAlign:'center',fontFamily:'monospace',fontSize:'20px',color:T.gold,fontWeight:700}}>{val}</div>
                    <button style={spinBtn} onClick={()=>set(v=>v+step)}>+</button>
                  </div>
                </div>
              ))}
            </div>
            <label style={{...lbl,marginBottom:'10px'}}>{L.lvlDur}</label>
            <div style={{display:'flex',alignItems:'center',gap:'14px'}}>
              <input type="range" min={5} max={60} step={5} value={blindMins} onChange={e=>setBlindMins(+e.target.value)} style={{flex:1}}/>
              <div style={{fontFamily:'monospace',fontSize:'20px',color:T.gold,minWidth:'64px',textAlign:'right'}}>{blindMins} {L.min}</div>
            </div>
          </div>
          <button onClick={isOnline?startHostLobby:startLocal} style={{width:'100%',padding:'18px',border:'none',background:`linear-gradient(135deg,${T.gold},#b08a20)`,borderRadius:'14px',color:T.bg,fontFamily:"'Barlow Condensed',sans-serif",fontSize:'20px',fontWeight:800,letterSpacing:'4px',cursor:'pointer',boxShadow:`0 4px 28px ${T.gold}44`,marginBottom:'40px'}}>
            {L.start}
          </button>
        </div>
      </div>
    );
  }

  if(screen==='host-lobby'){
    const joinUrl=`${APP_URL}?join=${roomCode}`;
    return(
      <div style={{height:'100dvh',background:T.bg,fontFamily:"'Barlow Condensed',sans-serif",color:T.text,display:'flex',flexDirection:'column',alignItems:'center',padding:'20px 14px 40px',overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
        <style>{CSS}</style>
        <div style={{width:'100%',maxWidth:'420px'}}>
          <div style={{textAlign:'center',marginBottom:'22px'}}>

            <div style={{fontSize:'52px',fontWeight:800,letterSpacing:'14px',color:T.gold,fontFamily:'monospace',textShadow:`0 0 30px ${T.gold}44`,marginTop:'14px'}}>{roomCode}</div>

          </div>
          <div style={{...card,marginBottom:'16px'}}>
            {lobbyPlayers.map((p,i)=>(
              <div key={p.id} style={{display:'flex',alignItems:'center',gap:'12px',padding:'8px 0',borderBottom:i<lobbyPlayers.length-1?'1px solid rgba(255,255,255,.06)':'none'}}>
                <div style={{width:'12px',height:'12px',borderRadius:'50%',background:SEAT_COLORS[i]}}/>
                <span style={{fontSize:'18px',fontWeight:600}}>{p.name}</span>
                {p.isHost&&<span style={{fontSize:'11px',background:T.gold+'22',color:T.gold,padding:'3px 8px',borderRadius:'5px',letterSpacing:'2px'}}>HOST</span>}

            ))}
            {Array.from({length:numP-lobbyPlayers.length}).map((_,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:'12px',padding:'8px 0',borderTop:'1px solid rgba(255,255,255,.06)'}}>
                <div style={{width:'12px',height:'12px',borderRadius:'50%',background:'rgba(255,255,255,.1)'}}/>
                <span style={{fontSize:'16px',color:T.dim,fontStyle:'italic'}}>{L.waitPlayers}</span>
              </div>
            ))}
          </div>
          <button onClick={launchOnlineGame} disabled={lobbyPlayers.length<2} style={{width:'100%',padding:'18px',border:'none',background:lobbyPlayers.length>=2?`linear-gradient(135deg,${T.gold},#b08a20)`:'rgba(255,255,255,.08)',borderRadius:'14px',color:lobbyPlayers.length>=2?T.bg:T.dim,fontFamily:"'Barlow Condensed',sans-serif",fontSize:'20px',fontWeight:800,letterSpacing:'4px',cursor:lobbyPlayers.length>=2?'pointer':'default',boxShadow:lobbyPlayers.length>=2?`0 4px 24px ${T.gold}44`:'none'}}>
            {L.startGame}
          </button>
        </div>
      </div>
    );
  }

  if(screen==='join')return(
    <div style={{minHeight:'100vh',background:T.bg,fontFamily:"'Barlow Condensed',sans-serif",color:T.text,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'20px 14px'}}>
      <style>{CSS}</style>
      <div style={{width:'100%',maxWidth:'400px',padding:'0 4px'}}>
        <button onClick={()=>setScreen('landing')} style={{background:'transparent',border:'1px solid rgba(255,255,255,.14)',color:T.dim,padding:'7px 14px',borderRadius:'8px',cursor:'pointer',fontSize:'16px',fontFamily:'inherit',marginBottom:'28px'}}>←</button>
        <div style={{fontSize:'24px',fontWeight:800,letterSpacing:'3px',color:T.gold,marginBottom:'26px'}}>{L.join}</div>
        <div style={card}>
          <label style={lbl}>{L.enterCode}</label>
          <input value={codeInput} onChange={e=>setCodeInput(e.target.value.toUpperCase().slice(0,4))} placeholder="KQJA" style={{...inp,fontSize:'28px',letterSpacing:'10px',textAlign:'center',fontFamily:'monospace',width:'100%'}}/>
        </div>
        <div style={{...card,marginBottom:'18px'}}>
          <label style={lbl}>{L.yourName}</label>
          <input value={nameInput} onChange={e=>setNameInput(e.target.value)} placeholder="Alice" style={inp}/>
        </div>
        <button onClick={joinGame} style={{width:'100%',padding:'18px',border:'none',background:`linear-gradient(135deg,${T.gold},#b08a20)`,borderRadius:'14px',color:T.bg,fontFamily:"'Barlow Condensed',sans-serif",fontSize:'20px',fontWeight:800,letterSpacing:'4px',cursor:'pointer'}}>
          {L.joinBtn}
        </button>
      </div>
    </div>
  );

  if(screen==='join-wait')return(
    <div style={{minHeight:'100vh',background:T.bg,fontFamily:"'Barlow Condensed',sans-serif",color:T.text,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'20px 14px'}}>
      <style>{CSS}</style>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:'52px',marginBottom:'18px',animation:'pulse 1.5s ease infinite'}}>🎴</div>
        <div style={{fontSize:'18px',color:T.dim,letterSpacing:'2px'}}>{L.waitHost}</div>
        <div style={{fontFamily:'monospace',fontSize:'40px',fontWeight:800,color:T.gold,letterSpacing:'14px',marginTop:'22px'}}>{roomCode}</div>
      </div>
    </div>
  );

  // ════════════════════════════════════════════════════════════════════
  // GAME SCREEN
  if((screen==='local-game'||screen==='online-game')&&gs)return(
    <div style={{height:'100dvh',display:'flex',flexDirection:'column',background:T.bg,fontFamily:"'Barlow Condensed',sans-serif",color:T.text,overflow:'hidden'}}>
      <style>{CSS}</style>
      <ConnBanner msg={connMsg}/>

      {/* Rename modal */}
      {renameModal!==null&&(
        <div style={{position:'fixed',inset:0,zIndex:997,background:'rgba(0,0,0,.7)',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}}>
          <div style={{background:T.panel,border:`1px solid rgba(255,255,255,.12)`,borderRadius:'18px',padding:'24px 20px',width:'100%',maxWidth:'320px'}}>
            <div style={{fontSize:'13px',letterSpacing:'3px',color:T.gold,marginBottom:'12px'}}>{L.rename.toUpperCase()}</div>
            <input autoFocus value={renameModal.name}
              onChange={e=>setRenameModal({...renameModal,name:e.target.value})}
              onKeyDown={e=>{if(e.key==='Enter')applyRename(renameModal.idx,renameModal.name);}}
              style={{background:'transparent',border:`1px solid rgba(255,255,255,.2)`,borderRadius:'10px',padding:'12px 14px',color:T.text,fontFamily:"'Barlow Condensed',sans-serif",fontSize:'20px',width:'100%',outline:'none',marginBottom:'14px'}}/>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
              <button onClick={()=>setRenameModal(null)} style={{padding:'13px',background:'transparent',border:'1px solid rgba(255,255,255,.15)',borderRadius:'10px',color:T.dim,fontFamily:'inherit',fontSize:'16px',fontWeight:600,cursor:'pointer'}}>✕</button>
              <button onClick={()=>applyRename(renameModal.idx,renameModal.name)} style={{padding:'13px',background:`linear-gradient(135deg,${T.gold},#b08a20)`,border:'none',borderRadius:'10px',color:T.bg,fontFamily:'inherit',fontSize:'16px',fontWeight:800,cursor:'pointer'}}>OK</button>
            </div>

      {milestoneN>0&&<MilestoneModal L={L} n={milestoneN} onClose={()=>setMilestoneN(0)}/>}

      {notif&&(
        <div style={{position:'fixed',top:'50%',left:'50%',zIndex:998,pointerEvents:'none',animation:'popIn 2.4s ease forwards',background:'rgba(8,12,22,.97)',border:`2px solid ${T.gold}`,borderRadius:'18px',padding:'18px 36px',color:T.gold,fontSize:'20px',fontWeight:700,textAlign:'center',whiteSpace:'nowrap',boxShadow:`0 0 32px ${T.gold}44`}}>{notif}</div>
      )}

      {/* Header — compact, no timer */}
      <div style={{height:'50px',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 10px',background:T.panel,borderBottom:'1px solid rgba(255,255,255,.06)',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:'7px'}}>
          <span style={{fontSize:'13px',letterSpacing:'2px',color:T.dim}}>{L.hand} #{gs.handNum}</span>
          <span style={{width:'1px',height:'16px',background:'rgba(255,255,255,.15)'}}/>
          <span style={{fontSize:'16px',fontWeight:600}}>
