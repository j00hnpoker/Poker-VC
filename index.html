          </span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
          {/* 📖 Hands reference */}
          <button onClick={()=>setShowHands(h=>!h)} style={{background:showHands?'rgba(212,175,55,.18)':'transparent',border:`1px solid ${showHands?T.gold:'rgba(255,255,255,.14)'}`,color:showHands?T.gold:T.dim,padding:'6px 9px',borderRadius:'7px',cursor:'pointer',fontSize:'18px',lineHeight:1}}>📖</button>
          <button onClick={()=>{if(gs)setRenameModal({idx:0,name:gs.players[0]?.name||''}); }} style={{background:'transparent',border:'1px solid rgba(255,255,255,.14)',color:T.dim,padding:'6px 9px',borderRadius:'7px',cursor:'pointer',fontSize:'13px',fontFamily:'inherit',letterSpacing:'1px'}}>{L.editNames}</button>
          {tMyTable&&(
            <button onClick={()=>setScreen(isTD?'t-host-manage':'t-player-wait')}
              style={{background:'rgba(212,175,55,.1)',border:'1px solid rgba(212,175,55,.2)',borderRadius:'7px',padding:'4px 8px',fontSize:'11px',color:T.gold,letterSpacing:'1px',fontWeight:700,cursor:'pointer'}}>
              🏆 {isTD?'Gestion':tMyTable.tableName}
            </button>
          )}
          <button onClick={()=>setScreen('landing')} style={{background:'transparent',border:'1px solid rgba(255,255,255,.14)',color:T.dim,padding:'6px 9px',borderRadius:'7px',cursor:'pointer',fontSize:'16px',fontFamily:'inherit'}}>⚙</button>
          <button onClick={()=>{const m=SFX.toggle();setSoundOn(!m);}} style={{background:'transparent',border:'1px solid rgba(255,255,255,.14)',color:soundOn?T.gold:T.dim,padding:'6px 9px',borderRadius:'7px',cursor:'pointer',fontSize:'16px'}}>{soundOn?'🔊':'🔇'}</button>
          <button onClick={()=>setConfirmQuit(true)} style={{background:'rgba(229,57,53,.1)',border:'1px solid rgba(229,57,53,.3)',color:'#ef5350',padding:'6px 9px',borderRadius:'7px',cursor:'pointer',fontSize:'12px',fontFamily:'inherit',fontWeight:700,letterSpacing:'1px'}}>✕</button>
        </div>
      </div>

      {/* Notification transfert en attente */}
      {tPendingXfer&&(
        <div style={{position:'absolute',bottom:'calc(100% + 8px)',left:'50%',transform:'translateX(-50%)',background:'rgba(212,175,55,.9)',borderRadius:'10px',padding:'6px 16px',fontSize:'13px',fontWeight:700,color:T.bg,whiteSpace:'nowrap',zIndex:50,boxShadow:'0 4px 16px rgba(0,0,0,.4)'}}>
          ⚡ Transfert → {tPendingXfer.toName} après cette main
        </div>
      )}

      {/* Street banner */}
      {streetBanner&&(
        <div style={{
          position:'fixed',top:'50%',left:'50%',zIndex:97,
          pointerEvents:'none',
          animation:'streetIn 1.6s ease forwards',
          background:'rgba(8,12,22,.92)',
          border:`2px solid ${T.gold}`,
          borderRadius:'20px',padding:'18px 40px',
          color:T.gold,fontSize:'32px',fontWeight:800,
          letterSpacing:'4px',textAlign:'center',
          boxShadow:`0 0 40px ${T.gold}44`,
          whiteSpace:'nowrap',
        }}>{streetBanner}</div>
      )}

      {/* Confirmation quitter */}
      {confirmQuit&&(
        <div style={{position:'fixed',inset:0,zIndex:998,background:'rgba(0,0,0,.8)',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}}>
          <div style={{background:'#131926',border:'1px solid rgba(255,255,255,.12)',borderRadius:'18px',padding:'28px 22px',maxWidth:'320px',width:'100%',textAlign:'center'}}>
            <div style={{fontSize:'32px',marginBottom:'12px'}}>🚪</div>
            <div style={{fontSize:'18px',fontWeight:700,color:'#dde3f0',marginBottom:'8px',letterSpacing:'1px'}}>
              Quitter la partie ?
            </div>
            <div style={{fontSize:'14px',color:'#5a6a88',marginBottom:'22px',lineHeight:1.5}}>
              La partie en cours sera perdue.
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
              <button onClick={()=>setConfirmQuit(false)} style={{padding:'13px',background:'transparent',border:'1px solid rgba(255,255,255,.15)',borderRadius:'10px',color:'#dde3f0',fontFamily:"'Barlow Condensed',sans-serif",fontSize:'16px',fontWeight:600,cursor:'pointer',letterSpacing:'1px'}}>
                ANNULER
              </button>
              <button onClick={()=>{setConfirmQuit(false);quitGame();}} style={{padding:'13px',background:'rgba(229,57,53,.15)',border:'1px solid rgba(229,57,53,.4)',borderRadius:'10px',color:'#ef5350',fontFamily:"'Barlow Condensed',sans-serif",fontSize:'16px',fontWeight:700,cursor:'pointer',letterSpacing:'1px'}}>
                QUITTER
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Hands overlay */}
      {showHands&&(
        <div style={{position:'fixed',inset:0,zIndex:96,background:'rgba(0,0,0,.85)',overflowY:'auto'}} onClick={()=>setShowHands(false)}>
          <div onClick={e=>e.stopPropagation()} style={{maxWidth:'460px',margin:'0 auto',padding:'12px 14px 40px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0 14px'}}>
              <span style={{fontSize:'13px',letterSpacing:'4px',color:T.gold}}>BEST → WORST</span>
              <button onClick={()=>setShowHands(false)} style={{background:'transparent',border:'1px solid rgba(255,255,255,.2)',borderRadius:'8px',color:T.dim,padding:'6px 12px',cursor:'pointer',fontSize:'16px',fontFamily:'inherit'}}>✕</button>
            </div>
            <PokerHandsPanel L={L}/>
          </div>
        </div>
      )}

      {/* Table */}
          <div style={{flex:1,position:'relative',minHeight:0,overflow:'hidden'}}>
            {(()=>{
              const th=TABLE_THEMES[tableTheme]||TABLE_THEMES.casino;
              if(th.img){
                return(<>
                  <div style={{position:'absolute',inset:'2%',borderRadius:'50%',
                    backgroundImage:`url(${th.img})`,backgroundSize:'cover',backgroundPosition:'center',
                    boxShadow:'inset 0 4px 14px rgba(0,0,0,.6), inset 0 0 0 2000px rgba(0,0,0,.04)'}}/>
                  <div style={{position:'absolute',inset:'6%',borderRadius:'50%',
                    backgroundImage:`url(${th.img})`,backgroundSize:'160%',backgroundPosition:'center',
                    boxShadow:'inset 0 0 40px rgba(0,0,0,.35)'}}/>
                </>);
              }
              return(<>
                <div style={{position:'absolute',inset:'2%',borderRadius:'50%',background:T.rail,boxShadow:'inset 0 4px 14px rgba(0,0,0,.6)'}}/>
                <div style={{position:'absolute',inset:'6%',borderRadius:'50%',background:`radial-gradient(ellipse at 50% 40%,${T.felt} 0%,${T.felt2} 100%)`,boxShadow:'inset 0 0 34px rgba(0,0,0,.38)'}}/>
              </>);
            })()}
            <div style={{position:'absolute',inset:'11%',borderRadius:'50%',border:'1px solid rgba(255,255,255,.04)',pointerEvents:'none'}}/>

            {/* Timer + Pause flottant sur la table */}
            {/* Seat swap hint */}
            {selSeat!==null&&(
              <div style={{position:'absolute',top:'8%',left:'50%',transform:'translateX(-50%)',zIndex:10,background:'rgba(30,136,229,.9)',borderRadius:'10px',padding:'6px 16px',fontSize:'14px',color:'#fff',fontWeight:600,letterSpacing:'1px',whiteSpace:'nowrap'}}>{L.swapHint}</div>
            )}

            {/* Pot + Timer au centre */}
            <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center',zIndex:4}}>
              {(()=>{const tc=TABLE_THEMES[tableTheme]?.textColor||T.gold;return(<>
              <div style={{fontSize:'13px',letterSpacing:'4px',color:`${tc}99`,marginBottom:'2px',pointerEvents:'none',textShadow:'0 1px 3px rgba(0,0,0,.8)'}}>{roundLabel}</div>
              <div style={{fontFamily:'monospace',fontSize:'44px',fontWeight:700,color:tc,lineHeight:1,textShadow:'0 2px 8px rgba(0,0,0,.9)',pointerEvents:'none'}}>{fmt(gs.pot)}</div>
              {roundBets>0&&<div style={{fontSize:'15px',color:`${tc}cc`,marginTop:'2px',fontFamily:'monospace',pointerEvents:'none',textShadow:'0 1px 3px rgba(0,0,0,.8)'}}>+ {fmt(roundBets)}</div>}
              </>);})()} 
              {/* Timer + pause sous le pot */}
              <div style={{display:'inline-flex',alignItems:'center',gap:'7px',marginTop:'8px',background:'rgba(8,12,22,.6)',border:`1px solid ${timerCrit?T.red:T.gold}33`,borderRadius:'16px',padding:'4px 10px 4px 12px'}}>
                <span style={{fontSize:'10px',letterSpacing:'2px',color:T.dim,lineHeight:1}}>{L.lvl}{(gs.blindLvl||0)+1}</span>
                <span style={{fontFamily:'monospace',fontSize:'20px',fontWeight:700,color:timerCrit?T.red:T.gold,animation:timerCrit?'pulse 1s infinite':'none',lineHeight:1}}>{fmtTime(timer)}</span>
                <button onClick={()=>setPaused(p=>!p)} style={{background:paused?`rgba(212,175,55,.2)`:'transparent',border:`1px solid ${paused?T.gold:'rgba(255,255,255,.15)'}`,color:paused?T.gold:'rgba(255,255,255,.4)',borderRadius:'50%',width:'24px',height:'24px',cursor:'pointer',fontSize:'12px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontFamily:'inherit',padding:0}}>{paused?'▶':'⏸'}</button>
              </div>
            </div>

            {/* Seats */}
            {gs.players.map((p,i)=>{
              const pos=seatPos(i,np);
              const bp=betPos(i,np);
              const isD=i===gs.dIdx;
              const isSB=i===sbIdx;
              const isBB=i===bbIdx;
              const isCur=p.id===curId&&gs.phase==='betting';
              const isSel=i===selSeat;
              const bet=gs.rBets?.[p.id]||0;
              return(
                <div key={p.id}>
                  <div onClick={()=>handleSeatTap(i)} style={{position:'absolute',left:`${pos.left}%`,top:`${pos.top}%`,
                    transform:(()=>{
                      if(!isCur)return'translate(-50%,-50%)';
                      // Avancer vers le centre de ~6%
                      const dx=(50-pos.left)*0.12;
                      const dy=(50-pos.top)*0.12;
                      return`translate(calc(-50% + ${dx.toFixed(1)}%), calc(-50% + ${dy.toFixed(1)}%)) scale(1.08)`;
                    })(),
                    width:'96px',
                    background:p.folded?'rgba(14,18,30,.6)':isCur?'rgba(22,28,44,.98)':'rgba(18,23,38,.95)',
                    border:isSel?`2px solid ${T.blue}`:isCur?`2px solid ${T.gold}`:p.folded?'1px solid rgba(255,255,255,.04)':'1px solid rgba(255,255,255,.1)',
                    borderRadius:'12px',padding:'8px 5px 7px',
                    display:'flex',flexDirection:'column',alignItems:'center',
                    opacity:p.folded?0.35:1,
                    animation:isSel?'glowSel 1.4s ease infinite':isCur?'seatPop 1.6s ease infinite':'none',
                    transition:'transform .3s ease, opacity .3s, border-color .2s',
                    zIndex:isCur||isSel?5:2,
                    cursor:gs.phase!=='betting'?'pointer':'default'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'3px',marginBottom:'3px'}}>
                      <div style={{width:'16px',height:'16px',borderRadius:'50%',background:p.color,flexShrink:0,boxShadow:isCur?`0 0 7px ${p.color}`:'none'}}/>
                      {/* D badge moved to floating puck */}
                      {isSB&&<span style={{fontSize:'10px',fontWeight:800,background:T.blue,color:'#fff',borderRadius:'4px',padding:'0 4px',lineHeight:'15px'}}>SB</span>}
                      {isBB&&<span style={{fontSize:'10px',fontWeight:800,background:T.red,color:'#fff',borderRadius:'4px',padding:'0 4px',lineHeight:'15px'}}>BB</span>}
                    </div>
                    <div onClick={(e)=>{e.stopPropagation();if(gs.phase!=='betting')setRenameModal({idx:i,name:p.name});}}
                      style={{fontSize:isCur?'18px':'16px',fontWeight:isCur?800:700,color:p.folded?T.dim:isCur?T.cream:T.text,maxWidth:'88px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textAlign:'center',cursor:'pointer',textTransform:'uppercase',letterSpacing:'.5px',transition:'font-size .2s'}}>
                      {p.folded?'– – –':p.name}
                    </div>
                    {!p.folded&&<div style={{fontSize:isCur?'18px':'16px',fontWeight:700,fontFamily:'monospace',color:isCur?T.gold:'rgba(212,175,55,.75)',marginTop:'2px',transition:'font-size .2s'}}>{fmt(p.stack)}</div>}
                    {!p.folded&&gs.rBets[p.id]>0&&(
                      <div style={{fontSize:'11px',fontFamily:'monospace',color:'rgba(255,140,0,.85)',marginTop:'1px',background:'rgba(255,140,0,.12)',borderRadius:'4px',padding:'0 4px',lineHeight:'14px'}}>
                        ↑{fmt(gs.rBets[p.id])}
                      </div>
                    )}
                  </div>
                  {bet>0&&!p.folded&&(
                    <div style={{position:'absolute',left:`${bp.left}%`,top:`${bp.top}%`,transform:'translate(-50%,-50%)',background:'rgba(212,175,55,.18)',border:`1px solid ${T.gold}44`,borderRadius:'10px',padding:'3px 10px',fontSize:'14px',fontWeight:700,color:T.gold,fontFamily:'monospace',pointerEvents:'none',zIndex:3,whiteSpace:'nowrap'}}>{fmt(bet)}</div>
                  )}
                </div>
              );
            })}

            {/* Dealer puck flottant */}
            {(()=>{
              const dPos=seatPos(gs.dIdx,np);
              const ctr={left:50,top:50};
              const px=dPos.left+(ctr.left-dPos.left)*0.55;
              const py=dPos.top+(ctr.top-dPos.top)*0.55;
              return(
                <div style={{position:'absolute',left:`${px}%`,top:`${py}%`,transform:'translate(-50%,-50%)',
                  width:'32px',height:'32px',borderRadius:'50%',
                  background:'#fff',border:'3px solid #ccc',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:'14px',fontWeight:900,color:'#111',
                  boxShadow:'0 2px 8px rgba(0,0,0,.6)',
                  zIndex:6,pointerEvents:'none',letterSpacing:'0',lineHeight:1,
                  fontFamily:"'Barlow Condensed',sans-serif"}}>D</div>
              );
            })()}
          </div>

          {/* BETTING PANEL */}
          {gs.phase==='betting'&&curActor&&(isMyTurn||screen==='local-game')&&(
            <div style={{background:T.panel,borderTop:'1px solid rgba(255,255,255,.07)',padding:'6px 10px 8px',flexShrink:0,animation:'slideUp .2s ease'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'4px'}}>
                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  <div style={{width:'14px',height:'14px',borderRadius:'50%',background:curActor.color}}/>
                  <span style={{fontSize:'16px',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase'}}>{curActor.name}</span>
                  <span style={{fontSize:'16px',color:T.dim}}>{L.stack}&nbsp;<span style={{color:T.cream,fontFamily:'monospace',fontSize:'14px'}}>{fmt(curActor.stack)}</span></span>
                </div>
                {owed>0&&<span style={{fontSize:'16px',color:T.dim}}>{L.toCall}&nbsp;<span style={{color:T.cream,fontFamily:'monospace',fontWeight:700}}>{fmt(owed)}</span></span>}
              </div>

              {/* Bet amount selector */}
              <div style={{marginBottom:'14px'}}>
                {canShowRaise&&(
                <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'5px'}}>
                  <span style={{fontSize:'11px',letterSpacing:'2px',color:T.dim,flexShrink:0}}>{gs.curBet===0?L.betLbl:L.raiseLbl}</span>
                  <span style={{flex:1,fontFamily:'monospace',fontSize:'20px',fontWeight:800,color:raiseAmtIsAllIn?T.red:T.gold,textAlign:'center'}}>{raiseAmtIsAllIn?L.allinB:fmt(raiseAmt)}</span>
                  <button onClick={()=>setRaiseAmt(a=>Math.max(minRaiseAmt,a-BB_now))} style={{padding:'4px 9px',background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.14)',borderRadius:'7px',color:T.text,fontFamily:'inherit',fontSize:'15px',fontWeight:700,cursor:'pointer'}}>−BB</button>
                  <button onClick={()=>setRaiseAmt(a=>Math.min(actorAllIn,a+BB_now))} style={{padding:'4px 9px',background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.14)',borderRadius:'7px',color:T.text,fontFamily:'inherit',fontSize:'15px',fontWeight:700,cursor:'pointer'}}>+BB</button>
                  <button onClick={()=>setRaiseAmt(actorAllIn)} style={{padding:'4px 9px',background:raiseAmtIsAllIn?'rgba(229,57,53,.2)':'rgba(255,255,255,.07)',border:`1px solid ${raiseAmtIsAllIn?T.red:'rgba(255,255,255,.14)'}`,borderRadius:'7px',color:raiseAmtIsAllIn?T.red:T.dim,fontFamily:'inherit',fontSize:'11px',fontWeight:800,cursor:'pointer',letterSpacing:'1px'}}>ALL IN</button>
                </div>)}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'6px'}}>
                  <button className="btn-r" onClick={handleFold} style={{padding:'10px 4px',fontSize:'15px'}}>{L.fold}</button>
                  <button className="btn-b" onClick={handleCall} style={{padding:'10px 4px',fontSize:'15px'}}>
                    {isCheck?L.check:<>{owed<=curActor.stack?L.call:L.allinC}<br/><span style={{fontSize:'12px',fontFamily:'monospace'}}>{fmt(Math.min(owed,curActor.stack))}</span></>}
                  </button>
                  {canShowRaise&&(
                    <button className="btn-g" onClick={()=>handleRaise(raiseAmt)} style={{padding:'10px 4px',fontSize:'15px'}}>
                      {isAllIn?L.allinB:gs.curBet===0?<>{L.bet}<br/><span style={{fontSize:'12px',fontFamily:'monospace'}}>{fmt(raiseAmt)}</span></>:<>{L.raise}<br/><span style={{fontSize:'12px',fontFamily:'monospace'}}>{fmt(raiseAmt)}</span></>}
                    </button>
                  )}
                  {hasUndo&&<button className="btn-undo" onClick={doUndo}>{L.undo}</button>}
                </div>
              </div>
            </div>
          )}

          {/* WAITING */}
          {gs.phase==='betting'&&curActor&&screen==='online-game'&&!isMyTurn&&(
            <div style={{background:T.panel,borderTop:'1px solid rgba(255,255,255,.07)',padding:'16px 14px',flexShrink:0,textAlign:'center'}}>
              <div style={{fontSize:'18px',color:T.dim,letterSpacing:'2px',animation:'pulse 1.5s ease infinite'}}>
                ⏳&nbsp;<span style={{color:T.cream,textTransform:'uppercase'}}>{curActor.name}</span>&nbsp;joue...
              </div>
              <div style={{fontSize:'13px',color:T.dim,marginTop:'4px',fontFamily:'monospace'}}>
                Stack : {fmt(curActor.stack)}
              </div>
            </div>
          )}

          {/* FOLD WIN — victoire de main */}
          {gs.phase==='foldwin'&&(()=>{
            const fw=gs.players.filter(p=>!p.folded&&p.stack>0);
            const winner=fw[0];
            return(
            <div style={{background:T.panel,borderTop:'1px solid rgba(255,255,255,.07)',padding:'12px 14px 14px',flexShrink:0,animation:'slideUp .2s ease'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px'}}>
                {winner&&<div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  <div style={{width:'10px',height:'10px',borderRadius:'50%',background:winner.color}}/>
                  <span style={{fontSize:'18px',fontWeight:700,color:T.gold,textTransform:'uppercase'}}>{winner.name}</span>
                  <span style={{fontSize:'13px',color:T.dim}}>{L.wins}</span>
                </div>}
                <span style={{fontFamily:'monospace',fontSize:'16px',color:T.gold}}>{fmt(winner?.stack||0)}</span>
              </div>
              {(screen==='local-game'||isHost)&&(
                <button onClick={handleNextHand} style={{width:'100%',padding:'13px',background:`rgba(212,175,55,.1)`,border:`1px solid ${T.gold}44`,borderRadius:'12px',color:T.gold,fontFamily:'inherit',fontSize:'16px',fontWeight:700,letterSpacing:'1px',cursor:'pointer'}}>{L.nextHand}</button>
              )}
            </div>
            );
          })()}

          {/* GAME OVER */}
          {gs.phase==='gameover'&&(
            <div style={{background:T.panel,borderTop:`2px solid ${T.gold}44`,padding:'18px 14px 20px',flexShrink:0,animation:'slideUp .25s ease',textAlign:'center'}}>
              <div style={{fontSize:'40px',marginBottom:'6px'}}>🏆</div>
              <div style={{fontSize:'26px',fontWeight:800,color:T.gold,letterSpacing:'2px',marginBottom:'4px'}}>
                {gs.players.sort((a,b)=>b.stack-a.stack)[0]?.name}
              </div>
              <div style={{fontSize:'14px',color:T.dim,letterSpacing:'2px',marginBottom:'18px'}}>{L.nWinsG('').replace('!','').trim()}</div>
              {/* Host : REVANCHE + NOUVELLE PARTIE | Guest : QUITTER */}
              {(screen==='local-game'||isHost)?(
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
                  <button onClick={startRematch} style={{padding:'16px',background:`linear-gradient(135deg,${T.gold},#b08a20)`,border:'none',borderRadius:'12px',color:T.bg,fontFamily:'inherit',fontSize:'18px',fontWeight:800,letterSpacing:'2px',cursor:'pointer'}}>
                    {L.rematch}
                  </button>
                  <button onClick={()=>{localStorage.removeItem('vpc_screen');setGs(null);setScreen(screen==='online-game'?'landing':'local-setup');}} style={{padding:'16px',background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.18)',borderRadius:'12px',color:T.text,fontFamily:'inherit',fontSize:'16px',fontWeight:700,letterSpacing:'1px',cursor:'pointer'}}>
                    {L.newGame}
                  </button>
                </div>
              ):(
                <button onClick={quitGame} style={{width:'100%',padding:'16px',background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.18)',borderRadius:'12px',color:T.dim,fontFamily:'inherit',fontSize:'16px',fontWeight:700,letterSpacing:'1px',cursor:'pointer'}}>
                  Quitter
                </button>
              )}
            </div>
          )}

          {/* SHOWDOWN */}
          {gs.phase==='showdown'&&(
            <div style={{background:T.panel,borderTop:'1px solid rgba(255,255,255,.07)',padding:'14px 14px 16px',flexShrink:0,animation:'slideUp .2s ease'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'6px'}}>
                <span style={{fontSize:'14px',letterSpacing:'3px',color:T.dim}}>{L.showdown}</span>
                <span style={{fontFamily:'monospace',fontSize:'22px',fontWeight:700,color:T.gold}}>{fmt(gs.pot)} {L.inPot}</span>
              </div>
              {/* Contributions individuelles */}
              {gs.handBets&&Object.keys(gs.handBets).length>0&&(
                <div style={{display:'flex',flexWrap:'wrap',gap:'4px',marginBottom:'10px'}}>
                  {gs.players.filter(p=>!p.folded&&(gs.handBets[p.id]||0)>0).sort((a,b)=>(gs.handBets[b.id]||0)-(gs.handBets[a.id]||0)).map(p=>(
                    <div key={p.id} style={{display:'flex',alignItems:'center',gap:'4px',padding:'3px 7px',background:'rgba(255,255,255,.06)',borderRadius:'6px',fontSize:'12px'}}>
                      <div style={{width:'7px',height:'7px',borderRadius:'50%',background:p.color}}/>
                      <span style={{color:T.dim,textTransform:'uppercase',letterSpacing:'.5px'}}>{p.name.slice(0,6)}</span>
                      <span style={{fontFamily:'monospace',color:T.gold,fontWeight:700}}>{fmt(gs.handBets[p.id]||0)}</span>
                    </div>
                  ))}
                </div>
              )}
              {(screen==='local-game'||isHost)&&sidePots?(()=>{
                // Résolution séquentielle : 1 pot à la fois
                const pidx=gs.sidePotIdx||0;
                const sp=sidePots[pidx];
                // Si tous les pots ont été résolus mais il reste des chips
                if(!sp){
                  if(gs.pot>0){
                    // Pot non distribué → montrer TOUS les joueurs actifs
                    const remaining=gs.players.filter(p=>!p.folded);
                    return(
                      <div>
                        <div style={{fontSize:'11px',letterSpacing:'2px',color:T.dim,marginBottom:'8px',display:'flex',justifyContent:'space-between'}}>
                          <span>POT PRINCIPAL</span>
                          <span style={{color:T.gold,fontFamily:'monospace',fontSize:'18px',fontWeight:700}}>{fmt(gs.pot)}</span>
                        </div>
                        <div style={{display:'grid',gridTemplateColumns:`repeat(${Math.min(remaining.length,4)},1fr)`,gap:'8px'}}>
                          {remaining.map(p=>(
                            <button key={p.id} onClick={()=>handleWinAll(p.id)}
                              style={{padding:'12px 4px',background:`rgba(212,175,55,.1)`,border:`1px solid ${T.gold}44`,borderRadius:'10px',color:T.gold,fontFamily:'inherit',fontSize:'14px',fontWeight:700,cursor:'pointer'}}>
                              <div style={{display:'flex',alignItems:'center',gap:'4px',justifyContent:'center',marginBottom:'2px'}}>
                                <div style={{width:'8px',height:'8px',borderRadius:'50%',background:p.color}}/>
                                <span style={{textTransform:'uppercase',fontSize:'12px'}}>{p.name}</span>
                              </div>🏆
                            </button>
                          ))}
                        </div>
                      </div>
                    );
                  }
                  return null;
                }
                const eligible=gs.players.filter(p=>!p.folded&&sp.eligible.includes(p.id));
                const totalPots=sidePots.length;
                const autoWin=eligible.length===1;
                return(
                  <div>
                    {/* Indicateur de progression si > 1 side pot */}
                    {totalPots>1&&(
                      <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'10px'}}>
                        {sidePots.map((_,i)=>(
                          <div key={i} style={{flex:1,height:'3px',borderRadius:'2px',
                            background:i<pidx?T.gold:i===pidx?T.gold:'rgba(255,255,255,.15)',
                            opacity:i<pidx?0.4:1}}/>
                        ))}
                        <span style={{fontSize:'11px',color:T.dim,whiteSpace:'nowrap'}}>{pidx+1}/{totalPots}</span>
                      </div>
                    )}
                    {/* Label du pot courant */}
                    <div style={{fontSize:'11px',letterSpacing:'2px',color:T.dim,marginBottom:'8px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span>{pidx===0?'POT PRINCIPAL':`SIDE POT ${pidx}`}</span>
                      <span style={{color:T.gold,fontFamily:'monospace',fontSize:'18px',fontWeight:700}}>{fmt(sp.amount)}</span>
                    </div>
                    {autoWin?(
                      /* Pot non couvert : retourner automatiquement */
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 12px',background:'rgba(255,255,255,.04)',borderRadius:'10px',marginBottom:'8px'}}>
                        <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                          <div style={{width:'8px',height:'8px',borderRadius:'50%',background:eligible[0]?.color}}/>
                          <span style={{fontSize:'13px',color:T.dim}}>
                            Non couvert — <span style={{color:T.cream,textTransform:'uppercase'}}>{eligible[0]?.name}</span>
                          </span>
                        </div>
                        <button onClick={()=>handleWinPot(eligible[0].id,sp.amount,pidx+1)}
                          style={{padding:'6px 14px',background:`rgba(212,175,55,.12)`,border:`1px solid ${T.gold}44`,borderRadius:'8px',color:T.gold,fontFamily:'inherit',fontSize:'14px',fontWeight:700,cursor:'pointer'}}>
                          ↩ +{fmt(sp.amount)}
                        </button>
                      </div>
                    ):(
                      /* Sélectionner le gagnant */
                      <div style={{display:'grid',gridTemplateColumns:`repeat(${Math.min(eligible.length,4)},1fr)`,gap:'8px',marginBottom:'8px'}}>
                        {eligible.map(p=>(
                          <div key={p.id} style={{display:'flex',flexDirection:'column',gap:'3px'}}>
                            {/* Bouton principal : gagne toute la main */}
                            <button onClick={()=>handleWinAll(p.id)}
                              style={{padding:'10px 4px',background:`rgba(212,175,55,.18)`,border:`2px solid ${T.gold}88`,borderRadius:'10px',color:T.gold,fontFamily:'inherit',fontSize:'13px',fontWeight:800,cursor:'pointer',transition:'background .15s'}}
                              onTouchStart={e=>e.currentTarget.style.background='rgba(212,175,55,.35)'}
                              onTouchEnd={e=>e.currentTarget.style.background='rgba(212,175,55,.18)'}>
                              <div style={{display:'flex',alignItems:'center',gap:'4px',justifyContent:'center',marginBottom:'2px'}}>
                                <div style={{width:'8px',height:'8px',borderRadius:'50%',background:p.color}}/>
                                <span style={{fontSize:'12px',maxWidth:'55px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textTransform:'uppercase'}}>{p.name}</span>
                              </div>
                              🏆 MAIN
                            </button>
                            {/* Bouton secondaire : ce pot uniquement */}
                            <button onClick={()=>handleWinPot(p.id,sp.amount,pidx+1)}
                              style={{padding:'3px 2px',background:'transparent',border:'1px solid rgba(255,255,255,.1)',borderRadius:'6px',color:'rgba(255,255,255,.3)',fontFamily:'inherit',fontSize:'9px',fontWeight:600,cursor:'pointer',letterSpacing:'.5px'}}
                              title="Ce pot uniquement">
                              ce pot seul
                            </button>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })():(screen==='local-game'||isHost)?(
                <div style={{display:'grid',gridTemplateColumns:`repeat(${Math.min(active.length,4)},1fr)`,gap:'8px',marginBottom:'10px'}}>
                  {active.map(p=>(
                    <button key={p.id} onClick={()=>handleWin(p.id)} style={{padding:'12px 4px',background:`rgba(212,175,55,.12)`,border:`1px solid ${T.gold}44`,borderRadius:'12px',color:T.gold,fontFamily:'inherit',fontSize:'16px',fontWeight:700,cursor:'pointer'}}>
                      <div style={{display:'flex',alignItems:'center',gap:'5px',justifyContent:'center',marginBottom:'3px'}}>
                        <div style={{width:'10px',height:'10px',borderRadius:'50%',background:p.color}}/>
                        <span style={{fontSize:'14px',maxWidth:'60px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textTransform:'uppercase'}}>{p.name}</span>
                      </div>
                      {L.wins}
                    </button>
                  ))}
                </div>
              ):(
                <div style={{textAlign:'center',padding:'10px 0',fontSize:'14px',color:'#5a6a88',letterSpacing:'1px'}}>
                  En attente de la decision de l'hote...
                </div>
              )}
              {(screen==='local-game'||isHost)&&gs.pot===0&&(
                <button onClick={handleNextHand} style={{width:'100%',padding:'13px 4px',background:`rgba(212,175,55,.1)`,border:`1px solid ${T.gold}44`,borderRadius:'12px',color:T.gold,fontFamily:'inherit',fontSize:'16px',fontWeight:700,letterSpacing:'1px',cursor:'pointer'}}>{L.nextHand}</button>
              )}
              {gs.pot>0&&!sidePots&&(screen==='local-game'||isHost)&&(
                <div style={{fontSize:'13px',color:T.red,textAlign:'center',padding:'4px 0',letterSpacing:'1px'}}>
                  ⚠ Désignez d'abord le gagnant
                </div>
              )}
              {hasUndo&&<button className="btn-undo" style={{marginTop:'6px',width:'100%'}} onClick={doUndo}>{L.undo}</button>}
            </div>
          )}
    </div>
  );


  // ══════════════════════════════════════════════════════════════
  // SCREEN: t-join-or-create
  // ══════════════════════════════════════════════════════════════
  if(screen==='t-join-or-create')return(
    <div style={{height:'100vh',background:T.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px',gap:'16px'}}>
      <div style={{fontSize:'36px',marginBottom:'4px'}}>🏆</div>
      <div style={{fontSize:'28px',fontWeight:800,color:T.gold,letterSpacing:'3px',marginBottom:'16px'}}>TOURNOI</div>
      <button onClick={initTournamentAsTD} style={{width:'100%',maxWidth:'340px',padding:'18px',background:`linear-gradient(135deg,${T.gold},#b08a20)`,border:'none',borderRadius:'14px',color:T.bg,fontFamily:"'Barlow Condensed',sans-serif",fontSize:'20px',fontWeight:800,letterSpacing:'2px',cursor:'pointer'}}>
        🎯 Créer un tournoi
      </button>
      <div style={{width:'100%',maxWidth:'340px'}}>
        <input value={codeInput} onChange={e=>setCodeInput(e.target.value.toUpperCase().slice(0,4))} placeholder="CODE" style={{width:'100%',padding:'14px',background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.2)',borderRadius:'10px',color:T.text,fontFamily:'monospace',fontSize:'28px',letterSpacing:'12px',textAlign:'center',outline:'none',marginBottom:'8px'}}/>
        <input value={nameInput} onChange={e=>setNameInput(e.target.value)} placeholder="Votre nom" style={{width:'100%',padding:'14px',background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.14)',borderRadius:'10px',color:T.text,fontFamily:"'Barlow Condensed',sans-serif",fontSize:'18px',outline:'none',marginBottom:'8px'}}/>
        <button onClick={()=>{if(codeInput.length===4)joinTournamentChannel(codeInput);}} style={{width:'100%',padding:'16px',background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.18)',borderRadius:'12px',color:T.text,fontFamily:"'Barlow Condensed',sans-serif",fontSize:'18px',fontWeight:700,cursor:'pointer',letterSpacing:'1px'}}>
          🎟 Rejoindre avec un code
        </button>
      </div>
      <button onClick={()=>setScreen('landing')} style={{marginTop:'8px',background:'transparent',border:'none',color:T.dim,fontFamily:"'Barlow Condensed',sans-serif",fontSize:'14px',cursor:'pointer',letterSpacing:'1px'}}>← Retour</button>
    </div>
  );

  // ══════════════════════════════════════════════════════════════
  // SCREEN: t-host-lobby — DT assigne les joueurs aux tables
  // ══════════════════════════════════════════════════════════════
  if(screen==='t-host-lobby')return(
    <div style={{height:'100vh',background:T.bg,display:'flex',flexDirection:'column',fontFamily:"'Barlow Condensed',sans-serif",overflow:'hidden'}}>
      {/* Header */}
      <div style={{padding:'10px 14px',background:'rgba(0,0,0,.3)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
          <span style={{fontSize:'16px',fontWeight:700,color:T.gold,letterSpacing:'2px'}}>🏆 {tName}</span>
          <span style={{fontSize:'12px',color:T.dim,fontFamily:'monospace'}}>Code: <b style={{color:T.cream}}>{tCode}</b></span>

        </div>
        <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
          <span style={{fontSize:'12px',color:tWaiting.length>0?'#4caf50':T.dim}}>{tWaiting.length+tTables.reduce((s,t)=>s+t.players.length,0)} connectés</span>
          <button onClick={()=>setScreen('landing')} style={{background:'rgba(229,57,53,.1)',border:'1px solid rgba(229,57,53,.3)',color:'#ef5350',padding:'5px 9px',borderRadius:'7px',cursor:'pointer',fontSize:'12px',fontWeight:700}}>✕</button>
        </div>
      </div>

      {/* Main layout */}
      <div style={{flex:1,display:'flex',gap:'0',overflow:'hidden'}}>

        {/* Left: waiting players */}
        <div style={{width:'140px',flexShrink:0,borderRight:'1px solid rgba(255,255,255,.08)',padding:'10px 8px',overflowY:'auto'}}>
          <div style={{fontSize:'11px',letterSpacing:'2px',color:T.dim,marginBottom:'8px'}}>EN ATTENTE</div>
          {/* DT peut jouer — champ nom + bouton */}
          {!tWaiting.some(p=>p.id===myId.current)&&!tTables.flatMap(t=>t.players).some(p=>p.id===myId.current)&&(
            <div style={{marginBottom:'10px',display:'flex',flexDirection:'column',gap:'4px'}}>
              <input value={nameInput} onChange={e=>setNameInput(e.target.value)}
                placeholder="Mon nom..."
                style={{padding:'6px 8px',background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.12)',borderRadius:'7px',color:'#dde3f0',fontFamily:"'Barlow Condensed',sans-serif",fontSize:'13px',outline:'none',width:'100%'}}/>
              <button onClick={()=>{if(nameInput.trim())setTWaiting(prev=>[...prev,{id:myId.current,name:nameInput.trim()}]);}}
                style={{padding:'6px',background:'rgba(212,175,55,.15)',border:'1px solid rgba(212,175,55,.3)',borderRadius:'7px',color:'#D4AF37',fontFamily:"'Barlow Condensed',sans-serif",fontSize:'12px',fontWeight:700,cursor:'pointer',letterSpacing:'.5px'}}>
                ♟ Je joue
              </button>
            </div>
          )}
          {tWaiting.length===0&&<div style={{fontSize:'12px',color:'rgba(255,255,255,.2)',textAlign:'center',marginTop:'20px'}}>Aucun joueur<br/>en attente</div>}
          {tWaiting.map(p=>(
            <div key={p.id} onClick={()=>setTSelPid(tSelPid===p.id?null:p.id)}
              style={{padding:'8px 10px',borderRadius:'8px',marginBottom:'6px',cursor:'pointer',
                background:tSelPid===p.id?`rgba(212,175,55,.2)`:'rgba(255,255,255,.05)',
                border:tSelPid===p.id?`1px solid ${T.gold}`:'1px solid rgba(255,255,255,.08)',
                fontSize:'14px',fontWeight:700,color:tSelPid===p.id?T.gold:T.text,textTransform:'uppercase'}}>
              {p.name.slice(0,8)}
            </div>
          ))}
        </div>

        {/* Right: tables */}
        <div style={{flex:1,padding:'10px',overflowY:'auto'}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:'10px',marginBottom:'10px'}}>
            {tTables.map(tbl=>(
              <div key={tbl.id} onClick={()=>{if(tSelPid)tdAssignPlayer(tSelPid,tbl.id);}}
                style={{borderRadius:'12px',padding:'10px',minHeight:'120px',cursor:tSelPid?'pointer':'default',
                  background:tSelPid?'rgba(212,175,55,.08)':'rgba(255,255,255,.04)',
                  border:tSelPid?`2px dashed ${T.gold}88`:'1px solid rgba(255,255,255,.1)',
                  transition:'all .15s'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:'8px'}}>
                  <span style={{fontSize:'13px',fontWeight:700,color:T.gold,letterSpacing:'1px'}}>{tbl.name}</span>
                  <span style={{fontSize:'11px',color:T.dim}}>{tbl.players.length}/9</span>
                </div>
                {tbl.players.map((p,i)=>(
                  <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0',borderBottom:'1px solid rgba(255,255,255,.05)'}}>
                    <span style={{fontSize:'12px',color:i===0?T.gold:T.text,textTransform:'uppercase'}}>{i===0?'👑 ':''}{p.name.slice(0,8)}</span>
                    <button onClick={(e)=>{e.stopPropagation();tdAssignPlayer(p.id,null);}}
                      style={{background:'transparent',border:'none',color:'rgba(255,100,100,.5)',fontSize:'14px',cursor:'pointer',lineHeight:1,padding:'0 2px'}}>×</button>
                  </div>
                ))}
                {tSelPid&&<div style={{textAlign:'center',marginTop:'8px',fontSize:'11px',color:`${T.gold}88`}}>← Placer ici</div>}
              </div>
            ))}
          </div>
          <button onClick={()=>{
            const n=tTables.length+1;
            setTTables(prev=>[...prev,{id:'T'+n,name:'Table '+n,subCode:tCode+n,players:[]}]);
          }} style={{padding:'8px 16px',background:'transparent',border:'1px dashed rgba(255,255,255,.2)',borderRadius:'10px',color:T.dim,fontFamily:'inherit',fontSize:'13px',cursor:'pointer'}}>
            + Ajouter une table
          </button>
        </div>
      </div>

      {/* Footer: config + launch */}
      <div style={{padding:'10px 14px',background:'rgba(0,0,0,.3)',borderTop:'1px solid rgba(255,255,255,.07)',flexShrink:0}}>
        <div style={{display:'flex',gap:'10px',alignItems:'center',marginBottom:'10px',flexWrap:'wrap'}}>
          <label style={{fontSize:'12px',color:T.dim}}>Stack</label>
          <input type="number" value={tSStack} onChange={e=>setTSStack(+e.target.value)} style={{width:'80px',padding:'6px',background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.14)',borderRadius:'7px',color:T.text,fontFamily:'monospace',fontSize:'14px',outline:'none'}}/>
          <label style={{fontSize:'12px',color:T.dim}}>Blind (min)</label>
          <input type="number" value={tBMins} onChange={e=>setTBMins(+e.target.value)} style={{width:'60px',padding:'6px',background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.14)',borderRadius:'7px',color:T.text,fontFamily:'monospace',fontSize:'14px',outline:'none'}}/>
        </div>
        {(()=>{
          const tablesReady=tTables.filter(t=>t.players.length>=2);
          const totalAssigned=tTables.reduce((s,t)=>s+t.players.length,0);
          const canLaunch=tablesReady.length>0&&tWaiting.length===0;
          return(
            <button onClick={tdLaunchTournament} disabled={!canLaunch}
              style={{width:'100%',padding:'14px',background:canLaunch?`linear-gradient(135deg,${T.gold},#b08a20)`:'rgba(255,255,255,.05)',border:'none',borderRadius:'12px',color:canLaunch?T.bg:T.dim,fontFamily:"'Barlow Condensed',sans-serif",fontSize:'18px',fontWeight:800,letterSpacing:'2px',cursor:canLaunch?'pointer':'not-allowed'}}>
              {canLaunch?`🚀 LANCER (${tablesReady.length} table${tablesReady.length>1?'s':''}  ·  ${totalAssigned} joueurs)`:`⏳ ${tWaiting.length} joueur${tWaiting.length>1?'s':''} à placer`}
            </button>
          );
        })()}
      </div>
      {/* Retardataires — joueurs en attente après lancement */}
      {tWaiting.length>0&&(
        <div style={{margin:'10px 12px',padding:'10px',background:'rgba(212,175,55,.05)',border:'1px solid rgba(212,175,55,.15)',borderRadius:'12px'}}>
          <div style={{fontSize:'12px',letterSpacing:'2px',color:T.gold,marginBottom:'8px'}}>⏳ RETARDATAIRES ({tWaiting.length})</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'8px'}}>
            {tWaiting.map(p=>(
              <div key={p.id} style={{padding:'4px 10px',background:'rgba(255,255,255,.07)',borderRadius:'8px',fontSize:'13px',color:T.cream,fontWeight:600,textTransform:'uppercase'}}>{p.name}</div>
            ))}
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
            {tTables.filter(t=>!tTableStatus[t.subCode]?.done).map(tbl=>(
              <button key={tbl.id} onClick={()=>{
                const p=tWaiting[0];
                if(!p)return;
                tdAssignPlayer(p.id,tbl.id);
                // Envoyer ordre d'ajout à la table
                if(tChanRef2.current) tChanRef2.current.publish('t-add-player',{player:p,subCode:tbl.subCode});
              }} style={{padding:'6px 12px',background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.14)',borderRadius:'8px',color:T.dim,fontFamily:'inherit',fontSize:'12px',cursor:'pointer',fontWeight:700}}>
                + {tbl.name}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );

  // ══════════════════════════════════════════════════════════════
  // SCREEN: t-player-wait — Joueur attend son assignation
  // ══════════════════════════════════════════════════════════════
  if(screen==='t-player-wait')return(
    <div style={{height:'100vh',background:T.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px',gap:'20px',fontFamily:"'Barlow Condensed',sans-serif",textAlign:'center'}}>
      <div style={{fontSize:'48px'}}>{tMyTable?'🎯':'⏳'}</div>
      <div style={{fontSize:'26px',fontWeight:800,color:T.gold,letterSpacing:'2px'}}>TOURNOI</div>
      {tMyTable?(
        <>
          <div style={{fontSize:'20px',color:T.cream}}>Vous serez à</div>
          <div style={{fontSize:'32px',fontWeight:800,color:T.gold,letterSpacing:'2px'}}>{tMyTable.tableName}</div>
          {tMyTable.isHost&&<div style={{fontSize:'14px',color:'#4caf50',letterSpacing:'1px'}}>Vous êtes l'hôte de cette table</div>}
          <div style={{fontSize:'14px',color:T.dim,animation:'pulse 1.5s ease infinite'}}>En attente du lancement...</div>
        </>
      ):(
        <>
          <div style={{fontSize:'20px',color:T.text}}>Connecté : <b style={{color:T.cream}}>{nameInput||'Joueur'}</b></div>
          <div style={{fontSize:'15px',color:T.dim,animation:'pulse 1.5s ease infinite'}}>Le DT vous assigne une table...</div>
          {connMsg&&<div style={{fontSize:'13px',color:'#ef5350',marginTop:'8px',padding:'8px 16px',background:'rgba(229,57,53,.1)',borderRadius:'8px'}}>{connMsg}</div>}
          <div style={{fontSize:'12px',color:'rgba(255,255,255,.2)',marginTop:'16px'}}>Code tournoi : <b style={{fontFamily:'monospace'}}>{tCode}</b></div>
        </>
      )}
    </div>
  );

  // ══════════════════════════════════════════════════════════════
  // SCREEN: t-host-manage — DT gère le tournoi en cours
  // ══════════════════════════════════════════════════════════════
  if(screen==='t-host-manage')return(
    <div style={{height:'100vh',background:T.bg,display:'flex',flexDirection:'column',fontFamily:"'Barlow Condensed',sans-serif",overflow:'hidden'}}>
      {/* Header */}
      <div style={{padding:'10px 14px',background:'rgba(0,0,0,.3)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <div>
          <span style={{fontSize:'16px',fontWeight:800,color:T.gold,letterSpacing:'2px'}}>🏆 {tName}</span>
          <span style={{marginLeft:'10px',fontSize:'12px',color:T.dim,fontFamily:'monospace'}}>Code: <b style={{color:T.cream}}>{tCode}</b></span>
        </div>
        <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
          {/* Si le DT joue, bouton pour rejoindre sa table */}
          {tMyTable&&(
            <button onClick={()=>{
              // Lancer la connexion à la table du DT
              if(!ablyRef.current){
                setScreen('online-game');
                if(tMyTable.isHost){
                  initAbly(tMyTable.subCode,true);
                  setTimeout(()=>doLaunchOnline(tSStack,tBMins,tTablesRef.current.find(t=>t.id===tMyTable.tableId)?.players||[]),800);
                } else {
                  setTimeout(()=>initAblyAsGuest(tMyTable.subCode),400);
                  setScreen('online-game');
                }
              } else {
                setScreen('online-game');
              }
            }} style={{padding:'8px 14px',background:`rgba(212,175,55,.2)`,border:`1px solid ${T.gold}55`,borderRadius:'8px',color:T.gold,fontFamily:'inherit',fontSize:'14px',fontWeight:700,cursor:'pointer',letterSpacing:'1px'}}>
              ♟ Ma table
            </button>
          )}
          <button onClick={()=>tdPauseAll(!tPauseAll)}
            style={{padding:'8px 14px',background:tPauseAll?'rgba(76,175,80,.2)':'rgba(229,57,53,.1)',border:tPauseAll?'1px solid #4caf50':'1px solid rgba(229,57,53,.3)',borderRadius:'8px',color:tPauseAll?'#4caf50':'#ef5350',fontFamily:'inherit',fontSize:'14px',fontWeight:700,cursor:'pointer',letterSpacing:'1px'}}>
            {tPauseAll?'▶ REPRENDRE':'⏸ PAUSE GLOBALE'}
          </button>
        </div>
      </div>

      {/* Tables grid */}
      <div style={{flex:1,padding:'12px',overflowY:'auto'}}>
        {tTables.map(tbl=>{
          const status=tTableStatus[tbl.subCode];
          const isDone=status?.done;
          return(
            <div key={tbl.id} style={{borderRadius:'12px',padding:'12px',marginBottom:'10px',
              background:isDone?'rgba(76,175,80,.05)':'rgba(255,255,255,.04)',
              border:`1px solid ${isDone?'rgba(76,175,80,.3)':'rgba(255,255,255,.1)'}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
                <div>
                  <span style={{fontSize:'16px',fontWeight:700,color:isDone?'#4caf50':T.gold,letterSpacing:'1px'}}>{tbl.name}</span>
                  {status?.handNum&&<span style={{marginLeft:'8px',fontSize:'12px',color:T.dim}}>Main #{status.handNum}</span>}
                  {isDone&&<span style={{marginLeft:'8px',fontSize:'12px',color:'#4caf50'}}>✓ Terminée</span>}
                </div>
                {isDone&&status?.winner&&(
                  <span style={{fontSize:'13px',color:'#4caf50',fontWeight:700}}>🏆 {status.winner.name} {status.winner.stack}</span>
                )}
              </div>
              {/* Player stacks */}
              {status?.players&&(
                <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
                  {status.players.map(p=>(
                    <div key={p.id} style={{padding:'4px 8px',background:'rgba(255,255,255,.06)',borderRadius:'6px',fontSize:'12px',
                      display:'flex',alignItems:'center',gap:'5px'}}>
                      <span style={{color:T.text,textTransform:'uppercase'}}>{p.name.slice(0,6)}</span>
                      <span style={{color:T.gold,fontFamily:'monospace',fontWeight:700}}>{typeof p.stack==='number'?fmt(p.stack):p.stack}</span>
                    </div>
                  ))}
                </div>
              )}
              {!status?.players&&tbl.players.length>0&&(
                <div style={{fontSize:'12px',color:T.dim}}>
                  {tbl.players.map(p=>p.name).join(', ')} · En attente de données...
                </div>
              )}
              {/* Recave + Transfert */}
              {!isDone&&status&&status.players&&(
                <div style={{marginTop:'6px'}}>
                  {/* Recave */}
                  <div style={{display:'flex',flexWrap:'wrap',gap:'4px',alignItems:'center',marginBottom:'6px'}}>
                    <span style={{fontSize:'10px',color:T.dim,letterSpacing:'1px',marginRight:'2px'}}>RECAVE →</span>
                    {(status.players||[]).map(p=>(
                      <button key={'r'+p.id} onClick={()=>{
                        const a=prompt('Recave '+p.name+' — jetons ?');
                        if(a&&!isNaN(+a))tdRecave(p.id,tbl.subCode,+a);
                      }} style={{padding:'3px 7px',background:'rgba(76,175,80,.1)',border:'1px solid rgba(76,175,80,.3)',borderRadius:'6px',color:'#4caf50',fontFamily:'inherit',fontSize:'11px',cursor:'pointer'}}>
                        +{p.name.slice(0,6)}
                      </button>
                    ))}
                  </div>
                  {/* Transfert */}
                  {tTables.filter(t=>t.id!==tbl.id).length>0&&(
                    <div style={{borderTop:'1px solid rgba(255,255,255,.06)',paddingTop:'6px'}}>
                      <div style={{fontSize:'10px',color:T.dim,marginBottom:'4px',letterSpacing:'1px'}}>TRANSFÉRER →</div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
                        {(()=>{
                          const btns=[];
                          (status.players||[]).forEach(p=>{
                            tTables.filter(t=>t.id!==tbl.id).forEach(dest=>{
                              btns.push(<button key={p.id+dest.id} onClick={()=>tdInitiateTransfer(p.id,tbl.subCode,dest.subCode)}
                                style={{padding:'4px 8px',background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.12)',borderRadius:'6px',color:T.dim,fontFamily:'inherit',fontSize:'11px',cursor:'pointer'}}>
                                {p.name.slice(0,5)} → {dest.name}
                              </button>);
                            });
                          });
                          return btns;
                        })()}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );

  return <div style={{height:'100vh',background:T.bg,display:'flex',alignItems:'center',justifyContent:'center',color:T.dim,fontFamily:"'Barlow Condensed',sans-serif",fontSize:'18px',letterSpacing:'2px'}}>Loading...</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
